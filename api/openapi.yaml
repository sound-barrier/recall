# yaml-language-server: $schema=https://raw.githubusercontent.com/OAI/OpenAPI-Specification/main/schemas/v3.1/schema.json
#
# Recall HTTP API — OpenAPI 3.1.0 description of the routes mounted in
# pkg/cmd/server.go. Hand-written; keep in sync with that file. View with
# `make swagger` (runs Swagger UI in a container against this spec).
openapi: 3.1.0
info:
  title: Recall API
  version: 0.0.1
  description: |
    HTTP REST + SSE surface for the Recall Overwatch metrics app.

    Available in two flavors:
      * **Server binary** (`Recall-server`) — exposes this API by default
      * **Wails desktop binary with `--server`** — same API, same routes

    All `application/json` request and response bodies. Errors come back
    as `text/plain` from `http.Error` with the appropriate 4xx/5xx
    status. The base URL defaults to `http://127.0.0.1:7000`; override
    via `RECALL_SERVER_ADDR`.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: Recall
    url: https://github.com/sound-barrier/recall

servers:
  - url: http://127.0.0.1:7000
    description: Local server (default bind address)
  - url: http://{host}:{port}
    description: Custom bind address (set via RECALL_SERVER_ADDR)
    variables:
      host:
        default: 127.0.0.1
      port:
        default: "7000"

tags:
  - name: Matches
    description: Parsed match records.
  - name: Pipeline
    description: Trigger and observe the OCR ingest pipeline.
  - name: Settings
    description: App configuration — screenshots folder, OCR engine, toggles.
  - name: Data
    description: Database administration.
  - name: Events
    description: Server-Sent Events stream.
  - name: Assets
    description: Static screenshot serving.
  - name: Meta
    description: Build metadata.

paths:
  /api/match-results:
    get:
      tags: [Matches]
      summary: List all parsed match records
      description: |
        Returns one record per match, assembled by JOINing the
        per-screenshot-type rows (summary / scoreboard / personal /
        rank / unknown) that share each `match_key`. Read-time
        derivations (`inferSoleHeroPercent`, `inferResultFromRank`)
        plus role-from-hero and type-from-map lookups are applied
        on the fly — the underlying rows are never mutated.
      responses:
        "200":
          description: Array of match records.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchRecord"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/screenshots-dir:
    get:
      tags: [Settings]
      summary: Get the configured screenshots folder
      description: |
        Returns the path Recall is currently reading from. Can be
        absolute (e.g. `/Users/.../Overwatch/ScreenShots/Overwatch`) or
        relative to the server's working directory.
      responses:
        "200":
          description: Current path.
          content:
            application/json:
              schema:
                type: object
                required: [path]
                properties:
                  path:
                    type: string
                    example: screenshots
    post:
      tags: [Settings]
      summary: Set the screenshots folder
      description: |
        Persists to `settings.json` and re-targets the file watcher if
        it's armed. Path can be absolute or relative to the server's
        working directory.

        Validation (400 on failure):
        - Only filesystem-safe characters (alphanumerics, `_ . / \ : - <space>
          ( ) + ' ,`). Shell metacharacters, NUL bytes, and control codes
          are rejected.
        - Must be in canonical form — `filepath.Clean(path) == path`
          (no redundant slashes or `..` traversal segments).
        - Must point at an existing directory.

        The echoed-back `path` is the cleaned form actually stored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  example: /Users/jacob/Documents/Overwatch/ScreenShots/Overwatch
      responses:
        "200":
          description: New path echoed back.
          content:
            application/json:
              schema:
                type: object
                required: [path]
                properties:
                  path: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/parse:
    post:
      tags: [Pipeline]
      summary: Run a one-shot parse
      description: |
        Walks the configured screenshots folder, OCRs anything not
        already in the DB, and writes the merged rows. Idempotent —
        re-running won't duplicate matches already on record.
        Synchronous: the response only returns after parsing finishes.
        Progress is also broadcast via the SSE endpoint.
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/prometheus-enabled:
    get:
      tags: [Settings]
      summary: Get the Prometheus metrics-endpoint toggle
      description: |
        `true` iff the `:9091/metrics` listener is currently bound and
        the Prometheus collector is registered.
      responses:
        "200":
          description: Current state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnabledFlag"
    post:
      tags: [Settings]
      summary: Toggle the Prometheus metrics endpoint
      description: |
        Enabling binds `:9091/metrics` (override via
        `OWMETRICS_METRICS_ADDR`). Disabling shuts the listener down
        with a 2s grace period.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnabledFlag"
      responses:
        "200":
          description: New state echoed back.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnabledFlag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/watch-enabled:
    get:
      tags: [Settings]
      summary: Get the file-watcher toggle
      description: |
        `true` iff the fsnotify watcher is armed against the configured
        screenshots folder.
      responses:
        "200":
          description: Current state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnabledFlag"
    post:
      tags: [Settings]
      summary: Toggle the file watcher
      description: |
        When on, new `.png` / `.jpg` files in the configured folder are
        auto-parsed after a 60s debounce. Requires a working Tesseract
        binary — turning it on without one returns 500.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnabledFlag"
      responses:
        "200":
          description: New state echoed back.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnabledFlag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/tesseract-status:
    get:
      tags: [Settings]
      summary: Get the OCR engine status
      description: |
        Reports the configured Tesseract path, whether it resolves to a
        working binary, the reported version, whether that version is
        officially supported (5.x only), the platform default path, and
        any error from the last detection attempt.

        When `found` is true but `supported` is false (e.g. a 3.x or
        4.x binary), the UI shows a caution banner and prompts for
        confirmation before running a parse — results may be incorrect
        with unsupported versions.
      responses:
        "200":
          description: Current engine status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TesseractStatus"

  /api/tesseract-path:
    post:
      tags: [Settings]
      summary: Set the Tesseract binary path
      description: |
        Re-runs detection on the new path. The status returned reflects
        whether the binary at that path responds to `--version`.

        Validation (400 on failure — the path is rejected before
        `exec.Command` is invoked, so a malformed path never reaches a
        syscall):
        - Only filesystem-safe characters (alphanumerics, `_ . / \ : - <space>
          ( ) + ' ,`). Shell metacharacters, NUL bytes, and control codes
          are rejected.
        - Must be in canonical form — `filepath.Clean(path) == path`.
        - Must be an absolute path.
        - Basename must be exactly `tesseract` or `tesseract.exe` — this
          pins the endpoint to "swap which Tesseract is used" and
          forbids using it to launch arbitrary binaries.

        `POST /api/tesseract-reset` bypasses this validation because the
        platform default (`defaultTesseractPath()`) is trusted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  example: /opt/homebrew/bin/tesseract
      responses:
        "200":
          description: Re-detected status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TesseractStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/tesseract-reset:
    post:
      tags: [Settings]
      summary: Reset the Tesseract path to the platform default
      description: |
        Replaces the configured path with the platform default (Homebrew
        on macOS, `/usr/bin/tesseract` on Linux, the Windows installer
        path on Windows) and re-runs detection.
      responses:
        "200":
          description: Re-detected status against the default path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TesseractStatus"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/check-update:
    get:
      tags: [Meta]
      summary: Check for a newer release
      description: |
        Queries the GitHub releases API for the latest stable release and
        compares it against the running build version. Returns
        `available: false` when already up to date, running a dev build,
        or when the API is unreachable (network failures are silenced).
      responses:
        "200":
          description: Update availability info.
          content:
            application/json:
              schema:
                type: object
                required: [checked, dev_build, available, latest, url]
                properties:
                  checked:
                    type: boolean
                    description: |
                      True when a GitHub API call completed successfully.
                      False on network failure — show nothing in that case.
                    example: true
                  dev_build:
                    type: boolean
                    description: |
                      True when the running version is a dev build. The
                      latest release is then informational context, not an
                      upgrade prompt.
                    example: false
                  available:
                    type: boolean
                    description: |
                      True when the latest release is newer than the running
                      version (only meaningful when dev_build=false).
                    example: true
                  latest:
                    type: string
                    example: 0.0.15
                  url:
                    type: string
                    example: https://github.com/sound-barrier/recall/releases/tag/v0.0.15

  /api/version:
    get:
      tags: [Meta]
      summary: App build version
      description: |
        Returns the version string injected at build time via
        `-ldflags "-X recall/pkg/app.Version=<tag>"`.
        Falls back to `"dev"` for local builds outside the release pipeline.
      responses:
        "200":
          description: Current build version.
          content:
            application/json:
              schema:
                type: object
                required: [version]
                properties:
                  version:
                    type: string
                    example: 0.0.13-beta.0

  /api/owdata:
    get:
      tags: [Meta]
      summary: Overwatch reference data (hero roster + map roster)
      description: |
        Returns the static reference data baked into the parser at
        compile time from `pkg/parser/heroes.yaml` and
        `pkg/parser/maps.yaml`. Stable across an app session — the
        frontend may fetch once at load and cache. Source-of-truth
        for UI surfaces that render canonical Blizzard spelling
        (diacritics + capitalization preserved) and group heroes by
        role / maps by game type.
      responses:
        "200":
          description: The embedded OW reference data.
          content:
            application/json:
              schema:
                type: object
                required: [heroes_by_role, maps_by_type]
                properties:
                  heroes_by_role:
                    type: object
                    description: Hero names grouped by role, alphabetised within each role.
                    additionalProperties:
                      type: array
                      items: { type: string }
                    example:
                      tank: [Doomfist, "D.va", Reinhardt]
                      dps: [Ashe, Genji, Tracer]
                      support: [Ana, Juno, Mercy]
                  maps_by_type:
                    type: object
                    description: Map names grouped by game type, alphabetised within each type.
                    additionalProperties:
                      type: array
                      items: { type: string }
                    example:
                      control: ["Antarctic Peninsula", Busan, Nepal]
                      escort: [Dorado, "Watchpoint Gibraltar"]
                      hybrid: ["King's Row", Midtown]

  /api/new-screenshot-count:
    get:
      tags: [Pipeline]
      summary: Count of new screenshots awaiting parse
      description: |
        Returns the number of files in the configured folder that are
        not yet present in any `match_results` row's `source_files`.
      responses:
        "200":
          description: Count.
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count:
                    type: integer
                    minimum: 0
                    example: 3
        "500":
          $ref: "#/components/responses/InternalError"

  /api/clear-database:
    post:
      tags: [Data]
      summary: Wipe all parsed match records
      description: |
        Deletes every row from `match_results`. Settings and the
        screenshots folder are untouched; you can re-parse to rebuild.
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/data-location:
    get:
      tags: [Data]
      summary: Report the on-disk paths used by this install
      description: |
        Surface the SQLite database path, settings file path, base
        data directory, and the currently-configured screenshots
        folder. Honors the `RECALL_DATA_DIR` env override (set in
        `.envrc` for `wails dev`), so the response matches what the
        running app actually reads/writes.
      responses:
        "200":
          description: Path inventory.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataLocation"

  /api/export:
    get:
      tags: [Data]
      summary: Download a full backup of the local parsed-match database
      description: |
        Streams a JSON document containing every per-screenshot row
        across all 5 parent tables plus the screenshots-dirs lookup,
        wrapped in a schema-versioned envelope. The result is
        round-trippable via `POST /api/import` — the canonical Recall
        backup format.

        The payload is opaque to users (download and feed back later);
        the envelope's `schema` field gates compatibility across
        Recall versions.
      responses:
        "200":
          description: JSON download.
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="recall-export-20260526-013000.json"'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecallExport"

  /api/export.csv:
    get:
      tags: [Data]
      summary: Download a CSV-format backup of the local parsed-match database
      description: |
        Returns a ZIP archive containing one CSV file per parent and
        child table plus a `manifest.json` with the envelope metadata.
        Same data version (`schema = recall-export/v1`) as
        `/api/export`, different container — chosen by the user when
        they want to inspect or edit the data in Excel / Sheets.

        Round-trips through `POST /api/import` — that endpoint
        auto-detects whether the uploaded payload is a JSON document
        or a ZIP archive via the first bytes.
      responses:
        "200":
          description: ZIP download.
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="recall-export-20260526-020000.zip"'
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /api/import:
    post:
      tags: [Data]
      summary: Restore the local database from a previously-exported backup
      description: |
        Replaces every row in the local database with the contents of
        the uploaded payload. Validates the envelope's `schema` field
        before touching the store; mismatched versions are rejected
        with `400` and the existing data is left untouched.

        Accepts BOTH container formats — the server sniffs the payload's
        first bytes to detect a JSON envelope (`{` ...) or a ZIP archive
        (`PK\x03\x04` magic) and routes accordingly.

        The operation is REPLACE, not merge: anything currently in the
        store is dropped after the payload is validated and before the
        import lands. Callers should surface a confirmation step.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecallExport"
          application/zip:
            schema:
              type: string
              format: binary
              description: A ZIP archive produced by GET /api/export.csv.
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          description: |
            Malformed or wrong-schema payload. Body is a plain-text
            error message safe to surface to the user.
          content:
            text/plain:
              schema:
                type: string
                example: 'import: unsupported schema "recall-export/v9" (this build expects "recall-export/v1")'
        "500":
          $ref: "#/components/responses/InternalError"

  /api/events:
    get:
      tags: [Events]
      summary: Server-Sent Events stream
      description: |
        Long-lived `text/event-stream` connection. Subscribers receive:
          * `parse-progress` — fired per OCR'd file during a parse run,
            carries `{done, total, filename, screenshot_type, match_key?, data?, error?}`.
            `match_key` is the resolved key for the just-inserted row
            (present on post-insert events; absent on the mid-OCR
            preview event). `error` is set when that single file failed
            to parse; the batch continues to the next file regardless,
            so the client should render a warning without aborting the
            in-flight UI.
          * `match-updated` — fired immediately after each successful
            per-screenshot insert, carrying the fully-aggregated
            `MatchRecord` for the affected `match_key`. Lets the
            frontend incrementally render the Matches list as a parse
            run progresses (upsert by `match_key`). Same shape as one
            element of `GET /api/match-results`. May fire multiple
            times for the same match within a single parse batch as
            additional screenshots refine its fields.
          * `parse-complete` — fired after a parse run finishes
          * Keepalive comment lines every 25 s so reverse proxies
            don't close the connection

        Clients should reconnect on disconnect; messages are not
        replayed. After reconnect, the client should re-fetch
        `GET /api/match-results` as the authoritative reconciliation.
      responses:
        "200":
          description: SSE stream.
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: parse-progress
                  data: {"done":1,"total":5,"filename":"...png","screenshot_type":"scoreboard"}

                  event: match-updated
                  data: {"match_key":"match:2026-05-10T21:29:28","source_files":["...png"],"data":{...}}

                  event: parse-complete
                  data: {}

  /_screenshot/{filename}:
    get:
      tags: [Assets]
      summary: Serve a screenshot image from the configured folder
      description: |
        Streams a file from the configured screenshots directory. The
        `{filename}` parameter must be a plain basename; path traversal
        (`..`, `/`, `\`) is rejected. Used by the frontend to render
        `<img>` previews without round-tripping bytes through the JSON
        bridge.
      parameters:
        - in: path
          name: filename
          required: true
          schema:
            type: string
          description: URL-encoded basename of a file in the screenshots folder.
          example: Overwatch%202%20Screenshot%202026.05.10%20-%2021.49.34.41.png
      responses:
        "200":
          description: Image bytes.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
        "400":
          description: Malformed path or filename.
        "404":
          description: File not found, no folder configured, or path traversal rejected.

components:
  schemas:
    DataLocation:
      type: object
      required: [base_dir, settings_path, database_path]
      properties:
        base_dir:
          type: string
          description: |
            Root directory Recall reads/writes from. Honors
            `RECALL_DATA_DIR`; otherwise the platform user-config
            directory.
          example: /Users/jacob/Library/Application Support/Recall
        settings_path:
          type: string
          description: Absolute path to `settings.json`.
          example: /Users/jacob/Library/Application Support/Recall/settings.json
        database_path:
          type: string
          description: Absolute path to the SQLite database file.
          example: /Users/jacob/Library/Application Support/Recall/db/recall.db
        screenshots_dir:
          type: string
          description: |
            Currently-configured screenshots folder. Empty string
            when not yet set.
          example: /Users/jacob/Documents/Overwatch/Screenshots

    RecallExport:
      type: object
      required: [schema, exported_at, recall_version]
      description: |
        Schema-versioned envelope for the local backup format produced
        by `GET /api/export` and consumed by `POST /api/import`. The
        per-row arrays mirror the SQLite parent + child tables; the
        `screenshots_dirs` map carries the path-by-id reference so
        FKs survive the auto-increment reset that happens during
        import.
      properties:
        schema:
          type: string
          description: Envelope version. Current value `recall-export/v1`.
          example: recall-export/v1
        exported_at:
          type: string
          format: date-time
        recall_version:
          type: string
          example: 0.1.4
        screenshots_dirs:
          type: object
          additionalProperties:
            type: string
          description: source-side `id` (stringified) → screenshots folder path
          example:
            "1": /Users/jacob/Documents/Overwatch/Screenshots
        summaries:    { type: array, items: { type: object } }
        scoreboards:  { type: array, items: { type: object } }
        personals:    { type: array, items: { type: object } }
        ranks:        { type: array, items: { type: object } }
        unknowns:     { type: array, items: { type: object } }

    MatchRecord:
      type: object
      description: |
        One match — assembled by JOINing the per-screenshot-type rows
        that share the same `match_key`. Identity is `match_key`; no
        separate `id` exists because no single row underlies a match
        anymore.
      required: [match_key, source_files, data]
      properties:
        match_key:
          type: string
          description: |
            Stable identity. Either `match:<ISO-timestamp>` (from the
            earliest screenshot's filename) or `unmatched:<filename>` for
            files whose names didn't parse as timestamps.
          example: "match:2026-05-10T22:21:11"
        source_files:
          type: array
          description: Every screenshot filename that fed this match.
          items:
            type: string
          example:
            - Overwatch Screenshot 2026.05.10 - 22.21.11.79.png
            - Overwatch Screenshot 2026.05.10 - 22.21.57.34.png
        source_types:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ScreenshotType"
          description: |
            Per-source-file screenshot classification. Populated at
            parse time. May be absent on rows parsed before this column
            landed.
          example:
            "Overwatch Screenshot 2026.05.10 - 22.21.11.79.png": scoreboard
            "Overwatch Screenshot 2026.05.10 - 22.21.57.34.png": rank
        source_parsed_at:
          type: object
          additionalProperties:
            type: string
            format: date-time
          description: |
            Per-source-file timestamp (ISO8601) of when each screenshot
            was first inserted into the DB. Stable across subsequent
            re-parses of the same match. May be absent on rows / files
            persisted before this column landed.
          example:
            "Overwatch Screenshot 2026.05.10 - 22.21.11.79.png": "2026-05-10T22:30:00Z"
            "Overwatch Screenshot 2026.05.10 - 22.21.57.34.png": "2026-05-10T22:30:00Z"
        source_dirs:
          type: object
          additionalProperties:
            type: string
          description: |
            Per-source-file screenshots-folder path the file was ingested
            from, normalized via the screenshots_dirs FK so changing the
            configured folder later doesn't rewrite history. May be
            absent on rows persisted before this column landed or rows
            where the dir was unset at parse time.
          example:
            "Overwatch Screenshot 2026.05.10 - 22.21.11.79.png": "/Users/jacob/Documents/Overwatch/Screenshots"
            "Overwatch Screenshot 2026.05.10 - 22.21.57.34.png": "/Users/jacob/Documents/Overwatch/Screenshots"
        parsed_at:
          type: string
          format: date-time
          description: |
            Match-level timestamp (ISO8601) of when the match record
            was first inserted into the DB. Stable across subsequent
            re-parses so the UI can display "parsed on X" without the
            value shifting when a later screenshot is added.
          example: "2026-05-10T22:30:00Z"
        data:
          $ref: "#/components/schemas/MatchResult"

    ScreenshotType:
      type: string
      enum: [summary, scoreboard, personal, rank]
      description: |
        Classification of one screenshot:
          * `summary` — post-match SUMMARY tab
          * `scoreboard` — in-game or post-match TEAMS scoreboard
          * `personal` — post-match PERSONAL tab
          * `rank` — competitive RANK PROGRESS screen

    MatchResult:
      type: object
      description: All parsed data for a match, merged across its source files.
      properties:
        map:        { type: string,  description: 'e.g. "rialto"' }
        type:       { type: string,  description: 'e.g. "control"' }
        mode:       { type: string,  enum: [competitive, quickplay, unranked, ""] }
        role:       { type: string,  enum: [tank, dps, support, ""] }
        hero:       { type: string,  description: "Primary (most-played) hero" }
        eliminations: { type: integer, minimum: 0 }
        assists:      { type: integer, minimum: 0 }
        deaths:       { type: integer, minimum: 0 }
        damage:       { type: integer, minimum: 0 }
        healing:      { type: integer, minimum: 0 }
        mitigation:   { type: integer, minimum: 0 }
        result:
          type: string
          enum: [victory, defeat, draw, ""]
        final_score:
          type: string
          example: "3-1"
        date:
          type: string
          example: "2026-05-10"
        finished_at:
          type: string
          description: HH:MM 24h as shown by the OW client.
          example: "21:29"
        game_length:
          type: string
          example: "11:25"
        heroes_played:
          type: array
          items:
            $ref: "#/components/schemas/HeroPlay"
        performance:
          $ref: "#/components/schemas/Performance"
        rank:
          type: string
          example: platinum
        level:
          type: integer
          minimum: 0
          maximum: 5
        modifiers:
          type: array
          items:
            type: string
          example: [expected, victory]
        rank_progress:
          type: integer
          minimum: 0
          maximum: 100
        change_percent:
          type: integer
          description: Percentage the rank moved this match (signed).
        sr:
          type: array
          items:
            $ref: "#/components/schemas/HeroSR"

    HeroPlay:
      type: object
      required: [hero, percent_played]
      properties:
        hero:
          type: string
          example: lucio
        percent_played:
          type: integer
          minimum: 0
          maximum: 100
          example: 100
        play_time:
          type: string
          example: "11:25"
        stats:
          type: object
          additionalProperties:
            type: integer
          description: Hero-specific stats keyed by snake_case label.
          example:
            weapon_accuracy: 24
            players_saved: 6

    HeroSR:
      type: object
      required: [hero, sr, change]
      properties:
        hero:    { type: string,  example: lucio }
        sr:      { type: integer, example: 2754 }
        change:  { type: integer, description: "Signed delta this match", example: 30 }

    Performance:
      type: object
      properties:
        eliminations: { $ref: "#/components/schemas/PerformanceStat" }
        assists:      { $ref: "#/components/schemas/PerformanceStat" }
        deaths:       { $ref: "#/components/schemas/PerformanceStat" }

    PerformanceStat:
      type: object
      required: [total]
      properties:
        total:
          type: integer
        avg_per_10min:
          type: number
          format: double

    TesseractStatus:
      type: object
      required: [path, found, version, supported, error, default]
      properties:
        path:
          type: string
          description: The currently-configured path.
          example: /opt/homebrew/bin/tesseract
        found:
          type: boolean
          description: True iff `path` resolves to a working binary.
        version:
          type: string
          description: Tesseract `--version` output (e.g. "5.4.1"). Empty when not found.
        supported:
          type: boolean
          description: True iff the detected major version is 5.x (the only officially supported series).
        error:
          type: string
          description: Description of the last detection failure, if any.
        default:
          type: string
          description: Platform default path (Homebrew on macOS, /usr/bin on Linux, etc.).

    EnabledFlag:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    Ok:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

  responses:
    Ok:
      description: 'Success — `{ "ok": true }`.'
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Ok"
    BadRequest:
      description: Malformed request body or query parameters.
      content:
        text/plain:
          schema:
            type: string
    InternalError:
      description: Unhandled server-side error.
      content:
        text/plain:
          schema:
            type: string
