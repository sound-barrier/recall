# yaml-language-server: $schema=https://raw.githubusercontent.com/OAI/OpenAPI-Specification/main/schemas/v3.1/schema.json
#
# Recall HTTP API — OpenAPI 3.1.0 description of the routes mounted in
# pkg/cmd/server.go. Hand-written; keep in sync with that file. View with
# `task swagger` (runs Swagger UI in a container against this spec).
openapi: 3.1.0
info:
  title: Recall API
  version: "1"
  description: |
    HTTP REST + SSE surface for the Recall Overwatch metrics app.

    Available in two flavors:
      * **Server binary** (`Recall-server`) — exposes this API by default
      * **Wails desktop binary with `--server`** — same API, same routes

    Conventions:
      * Every JSON endpoint is mounted under the `/api/v1/` prefix —
        the version is bumped on breaking changes.
      * Resources are nouns; sub-resources hang off the parent
        (`/matches/{match_key}/visibility`, `/settings/tesseract`).
      * Methods reflect intent: `GET` to read, `PUT` to replace/upsert,
        `DELETE` to clear or wipe, `POST` to start a server-side action
        that doesn't map to a single resource (the parse run).
      * Writes return `204 No Content` when there is no useful body
        to echo back; `202 Accepted` for actions whose effect is
        asynchronous (parse).
      * Errors come back as `application/problem+json` (RFC 9457) with
        the appropriate 4xx/5xx status. `type` is a stable URI under
        `https://github.com/sound-barrier/recall/problems/{slug}` that
        clients can switch on; body-validation problems carry a
        per-field `errors` array, and the data-update 422 carries a
        `failed_assets` list (RFC 9457 §3.2 extension members). The one
        exception is `405 Method Not Allowed`, emitted plain by the
        router.
      * Static image binaries stay at `/_screenshot/{filename}` —
        served from disk, not the JSON surface.

    The base URL defaults to `http://127.0.0.1:7000`; override via
    `RECALL_SERVER_ADDR`.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: Recall
    url: https://github.com/sound-barrier/recall

servers:
  - url: http://127.0.0.1:7000
    description: Local server (default bind address)
  - url: http://{host}:{port}
    description: Custom bind address (set via RECALL_SERVER_ADDR)
    variables:
      host:
        default: 127.0.0.1
      port:
        default: "7000"

tags:
  - name: Matches
    description: Parsed match records.
  - name: Pipeline
    description: Trigger and observe the OCR ingest pipeline.
  - name: Settings
    description: App configuration — screenshots folder, OCR engine, toggles.
  - name: System
    description: Build metadata, update check, reference data, on-disk paths.
  - name: Backup
    description: Database export + restore.
  - name: Events
    description: Server-Sent Events stream.
  - name: Assets
    description: Static screenshot serving.
  - name: Profiles
    description: Multi-profile switcher — main + alt accounts.

paths:
  /api/v1/matches:
    get:
      operationId: GetMatchResults
      tags: [Matches]
      summary: List parsed match records (optionally paginated)
      description: |
        Returns match records, assembled by JOINing the
        per-screenshot-type rows (summary / teams / personal /
        rank / unknown) that share each `match_key`. Read-time
        derivations (`inferSoleHeroPercent`, `inferResultFromRank`)
        plus role-from-hero and type-from-map lookups are applied
        on the fly — the underlying rows are never mutated.

        **Pagination.** Optional `limit` (1–1000) caps the number
        of records returned. Optional `cursor` is the previous
        page's last `match_key`; the next page starts strictly
        after it. Omitting both returns the full corpus
        (back-compat). The cursor is the match_key itself, not an
        opaque encoded value, so curl users can page without a
        lookup table.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          description: Max records per page. Clamped to [1, 1000].
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: |
            The previous page's last `match_key`. Returned records
            start strictly after it. Empty / absent = first page.
      responses:
        "200":
          description: Array of match records.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: ClearMatches
      tags: [Matches]
      summary: Wipe all parsed match records
      description: |
        Deletes every row from the per-screenshot tables (and their
        child rows via `ON DELETE CASCADE`) plus the auxiliary tables
        (reviews, queue, play-mode, annotations, hidden flags,
        ambiguous candidates, and the suppress-list). Settings and
        the screenshots folder are untouched; you can re-parse to
        rebuild.

        The optional `keep_ignored=true` query param preserves the
        Unknown-tab "Delete forever" suppress list across the wipe
        (Settings → Advanced surfaces this as a "Keep suppress-list"
        checkbox). Default-off matches the historical factory-reset
        semantic.

        `keep_ignored` covers only that suppress list — the separate
        "All Heroes" recognition skip-list is always cleared, even with
        `keep_ignored=true`. This is benign: those screenshots are
        re-recognized and re-skipped on the next parse, so nothing is
        lost.
      parameters:
        - name: keep_ignored
          in: query
          required: false
          schema:
            type: boolean
          description: |
            Preserve the `ignored_screenshots` suppress list across
            the wipe. Defaults to false (the historical factory-reset
            semantic). Strict — anything other than `true` / `false`
            / absent returns 400.
      responses:
        "204":
          description: All matches cleared.
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: CreateManualMatch
      tags: [Matches]
      summary: Hand-enter a match (no OCR)
      description: |
        Creates a manual match for users without Tesseract. The server
        derives the `match_key` from `played_at` (default now), rejects a
        collision with any existing match (409 — pick a different minute),
        writes the user-data override row plus the queue / play-mode aux
        rows, and returns the aggregated MatchRecord (`source: manual`).
        The right-side detail-panel choosers (review, replay code, …) then
        work unchanged, keyed by the new `match_key`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualMatchInput"
      responses:
        "201":
          description: The created manual match.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: A match already exists at that time; pick a different minute.
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/matches/{match_key}:
    parameters:
      - $ref: "#/components/parameters/MatchKey"
    get:
      operationId: GetMatchByKey
      tags: [Matches]
      summary: Read a single match by key
      description: |
        Returns the aggregated `MatchRecord` for one match. Identical
        wire shape to a single entry from `GetMatchResults`, with the
        same read-time inference + child-table folding semantics —
        consumers that need just one match can avoid pulling the
        whole corpus.

        404 on unknown keys (the `ErrMatchNotFound` sentinel routes
        through `errors.Is` to keep honest "not in corpus" out of
        the 500 catch-all).
      responses:
        "200":
          description: Match found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Match not found.
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: HardDeleteMatch
      tags: [Matches]
      summary: Hard-delete a single match
      description: |
        Removes every trace of the match from the database: rows
        across all five parent screenshot tables (children CASCADE),
        the `match_annotations` row, and the `hidden_matches` flag.
        Source PNG files on disk are NOT touched, but `LoadAllFilenames`
        will then re-classify them as new and the next parse will
        re-ingest. Surfaced by the Hidden drawer's **Delete forever**
        affordance — the user has already moved the match to the
        archive and explicitly confirmed.

        Idempotent: unknown keys return 204.
      responses:
        "204":
          description: Match removed (or already absent).
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/matches/{match_key}/visibility:
    parameters:
      - $ref: "#/components/parameters/MatchKey"
    put:
      operationId: SetMatchVisibility
      tags: [Matches]
      summary: Hide or unhide a match (soft delete)
      description: |
        Flips a match's hidden state. `hidden: true` records a
        soft-delete entry in the `hidden_matches` table; the
        aggregator then sets `MatchRecord.hidden = true` on every
        read and the default filter drops the match from the
        Matches list. The per-screenshot rows in the parent tables
        are untouched, so a re-parse of the same PNG files continues to
        skip them (`LoadAllFilenames` sees them as parsed).

        `hidden: false` removes the soft-delete and the match
        re-appears. Both directions are idempotent — repeated
        identical calls succeed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hidden]
              properties:
                hidden:
                  type: boolean
                  description: True to hide; false to unhide.
      responses:
        "204":
          description: Visibility updated.
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/matches/{match_key}/resolution:
    parameters:
      - $ref: "#/components/parameters/MatchKey"
    put:
      operationId: ResolveAmbiguousMatch
      tags: [Matches]
      summary: Resolve an ambiguous-attribution screenshot
      description: |
        When the resolver can't pin a screenshot to a single match
        (identical EAD signature within the 5-30 min ambiguous window,
        or multiple candidates within 30 min), the parent row's
        `match_key` is set to `ambiguous-<filename>` and the candidate
        list is recorded in `ambiguous_candidates`. Other screenshots
        captured within `mergeWindow` of that one adopt the same
        sentinel via the timestamp-window pass — so several rows can
        share one ambiguous `match_key`.

        This endpoint rewrites every parent row carrying the given
        ambiguous key to `resolved_to`. The path `match_key` must
        start with `ambiguous-` (anything else returns 400).
        `resolved_to` must
        either be one of the recorded candidates OR a freshly-minted
        `match-<...>` key (the "Treat as new match" escape hatch in
        the Unknown tab).

        On success the ambiguous row + its candidates cascade-delete
        and a `match-updated` SSE event fires for the resolved key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resolved_to]
              properties:
                resolved_to:
                  type: string
                  description: |
                    The match the user picked. Must be one of the
                    recorded candidates or a `match-<...>` key.
                  example: "match-2026-05-10T21-29-28"
      responses:
        "204":
          description: Resolution applied.
        "400":
          description: |
            Invalid input — `match_key` doesn't start with
            `ambiguous-`, `resolved_to` is not one of the recorded
            candidates and isn't a freshly-minted `match-<...>` key,
            or the request body fails JSON validation.
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/matches/{match_key}/annotation:
    parameters:
      - $ref: "#/components/parameters/MatchKey"
    put:
      operationId: SetMatchAnnotation
      tags: [Matches]
      summary: Upsert a per-match user annotation
      description: |
        Lets the user tag a match with up to four pieces of metadata:

          - **leaver** — `self` (user left, data incomplete) /
            `team` (ally left, loss excused) / `enemy` (opponent left,
            win tainted). Drives W/L/D tally exclusion via the
            FilterRail leaver-handling setting.
          - **note** — free-text per-match commentary.
          - **replay_code** — Overwatch's six-character replay ID so
            the match can be re-watched in the in-game viewer.
          - **members** — BattleTags of group members; verbatim, no
            canonicalisation.

        Every field is optional, but at least one must carry content:
        this is an **upsert only**. An all-empty body is rejected with
        409 (the body parses but there's nothing to persist) — clearing
        an annotation is an explicit `DELETE` on this same path, so the
        verb states the intent.

        Returns 204 on success, 400 on a malformed body or a `leaver`
        outside the enum, 409 on an all-empty body, 500 on store error.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                # `note` and `replay_code` treat `null` and `""` as
                # the same "no value" — they're optional and the
                # server decodes either form as empty. `leaver` keeps
                # the strict enum because Spectral can't validate a
                # null member mixed into an enum (the parser bails);
                # the handler still tolerates `null` (Go decodes to
                # "" which is the explicit "no leaver tag" enum
                # value), so leaver: null lands as 204 — same outcome
                # as leaver: "".
                leaver:
                  $ref: "#/components/schemas/LeaverEnum"
                  description: |
                    One of the three leaver scenarios, or `""` to leave
                    untagged. An all-empty body (every field blank) is
                    rejected with 409 — use `DELETE` to clear the row.
                note:
                  type: string
                  description: Free-text per-match commentary. `null` = empty.
                replay_code:
                  type: string
                  description: Overwatch six-character replay ID. No format validation server-side. `null` = empty.
                members:
                  type: array
                  description: |
                    BattleTags of group members for this match. The server
                    trims whitespace, drops empty strings, and deduplicates;
                    the composite-PK on the child table catches any
                    duplicates that slip through. `null` is treated as an
                    empty list (clear members) — equivalent to `[]`.
                  items:
                    type: string
                    example: "Apollo#11234"
                tags:
                  type: array
                  description: |
                    Free-form labels applied to the match. `stack`,
                    `stream`, and `placement` are the conventional
                    three (the UI surfaces them as quick-add toggles)
                    but any string is accepted. Server lowercases +
                    trims + deduplicates before persistence so
                    `Stack` and `stack` collapse to one entry. Drives
                    the FilterRail "Tags" multi-select. `null` is
                    treated as an empty list (clear tags) — equivalent
                    to `[]`.
                  items:
                    type: string
                    example: stack
      responses:
        "204":
          description: Annotation persisted.
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: DeleteMatchAnnotation
      tags: [Matches]
      summary: Clear a per-match user annotation
      description: |
        Removes the match's annotation row entirely, cascading any
        member and tag rows away. Idempotent — deleting a match that has
        no annotation still returns 204. This is the explicit clear verb;
        `PUT` is upsert-only and rejects an all-empty body.
      responses:
        "204":
          description: Annotation cleared (or already absent).
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/matches/{match_key}/data:
    parameters:
      - $ref: "#/components/parameters/MatchKey"
    put:
      operationId: UpdateMatchData
      tags: [Matches]
      summary: Replace a match's user-data override set
      description: |
        Upserts the user override layer for a match — the editable copy
        kept separate from the parsed OCR rows. The body is the FULL
        current override set; a per-field revert is the same request with
        that field omitted. Overridden fields surface in the record's
        `edited_fields` and flip `source` to `ocr_edited`. Idempotent.

        Reset to pure OCR with the matching `DELETE`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserMatchDataInput"
      responses:
        "204":
          description: Override set persisted.
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: A map or hero override isn't in the Overwatch roster.
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: ResetMatchData
      tags: [Matches]
      summary: Reset a match to pure OCR (clear overrides)
      description: |
        Clears the user override set for a match, reverting an edited OCR
        match to its parsed values. (Deleting a hand-entered match is the
        per-match `DELETE /matches/{match_key}` hard-delete instead.)
        Idempotent — clearing an unedited match succeeds.
      responses:
        "204":
          description: Overrides cleared.
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/matches/{match_key}/review:
    parameters:
      - $ref: "#/components/parameters/MatchKey"
    put:
      operationId: SetMatchReview
      tags: [Matches]
      summary: Tag a match as reviewed
      description: |
        Records who reviewed this match's VOD. Two states:

          - `self`  — the user reviewed the VOD themselves
          - `coach` — a coach reviewed the VOD with the user

        Absence of a `match_reviews` row is the third logical state
        ("not reviewed"); use `DELETE` on the same path to revert
        there. Idempotent — repeated identical calls succeed.

        Returns 204 on success, 400 on validation failure
        (`reviewed_by` outside the enum), 500 on store error.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reviewed_by]
              properties:
                reviewed_by:
                  type: string
                  enum: [self, coach]
                  description: |
                    Who reviewed this match's VOD. To revert to "not
                    reviewed", call DELETE on this path instead of
                    PUTing an empty string.
      responses:
        "204":
          description: Review status updated.
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: ClearMatchReview
      tags: [Matches]
      summary: Clear the review-status tag
      description: |
        Removes the `match_reviews` row for this match, reverting it
        to the implicit "not reviewed" state. Idempotent — clearing
        an unreviewed match returns 204.
      responses:
        "204":
          description: Review tag cleared (or already absent).
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/matches/{match_key}/queue:
    parameters:
      - $ref: "#/components/parameters/MatchKey"
    put:
      operationId: SetMatchQueue
      tags: [Matches]
      summary: Override a match's queue type
      description: |
        Overrides the queue format auto-detected from the teams
        players-per-team count. Two states:

          - `role` — 5v5 role queue (locked 1-2-2 composition)
          - `open` — 6v6 open queue (any composition)

        A stored override always wins over detection. `DELETE` on the
        same path removes it, reverting the match to the detected value
        (or "queue not set" when nothing was detected). Idempotent —
        repeated identical calls succeed.

        Drives the radiogroup at the top of the match-detail panel
        and the Queue chip in "Narrow this set."

        Returns 204 on success, 400 on validation failure
        (`queue_type` outside the enum), 500 on store error.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [queue_type]
              properties:
                queue_type:
                  $ref: "#/components/schemas/QueueTypeEnum"
      responses:
        "204":
          description: Queue type updated.
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: ClearMatchQueue
      tags: [Matches]
      summary: Clear the queue-type tag
      description: |
        Removes the `match_queue` row for this match, reverting it
        to the implicit "queue not set" state. Idempotent — clearing
        an unset match returns 204.
      responses:
        "204":
          description: Queue tag cleared (or already absent).
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/matches/{match_key}/play-mode:
    parameters:
      - $ref: "#/components/parameters/MatchKey"
    put:
      operationId: SetMatchPlayMode
      tags: [Matches]
      summary: Override the match's play mode
      description: |
        Records a user override of the match's play mode. Two states:

          - `quickplay`   — casual game (no SR / rank progress)
          - `competitive` — ranked game (SR applies)

        Absence of a `match_play_mode` row is the third state
        ("follow the parser's read of data.playlist + rank-row presence");
        use `DELETE` on the same path to revert there. Idempotent —
        repeated identical calls succeed.

        Drives the radiogroup directly below the queue chooser in
        the match-detail panel and the Play mode chip in "Narrow
        this set."

        Returns 204 on success, 400 on validation failure
        (`play_mode` outside the enum), 500 on store error.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [play_mode]
              properties:
                play_mode:
                  $ref: "#/components/schemas/PlayModeEnum"
      responses:
        "204":
          description: Play-mode override updated.
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: ClearMatchPlayMode
      tags: [Matches]
      summary: Clear the play-mode override
      description: |
        Removes the `match_play_mode` override row, reverting to the
        fallback chain (parser data.playlist → rank-row presence →
        empty). Idempotent — clearing an unset match returns 204.
      responses:
        "204":
          description: Play-mode override cleared (or already absent).
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/matches/queue:
    put:
      operationId: BulkSetMatchQueue
      tags: [Matches]
      summary: Apply one queue type to many matches at once
      description: |
        Sets `queue_type` to the same value on every key in
        `match_keys` inside one SQLite transaction. Powers the sticky
        bulk-action toolbar on the Matches view — clicking "Set
        queue: Role Queue" with 47 rows checked fires this once
        instead of 47 per-match PUTs.

        Empty `queue_type` (string `""`) clears the rows (bulk
        Clear), reverting every listed match to the implicit "queue
        not set" state. `match_keys` is allowed to be empty — the
        endpoint is a no-op in that case.

        Returns 204 on success, 400 on validation failure
        (`queue_type` outside the enum + non-empty), 500 on store
        error.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [match_keys, queue_type]
              properties:
                match_keys:
                  type: array
                  items:
                    type: string
                  description: |
                    The set of match_keys to write. May be empty
                    (no-op); duplicates within the slice are tolerated
                    — the per-key upsert is idempotent.
                queue_type:
                  $ref: "#/components/schemas/QueueTypeBulkEnum"
      responses:
        "204":
          description: All listed matches' queue type updated.
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/matches/play-mode:
    put:
      operationId: BulkSetMatchPlayMode
      tags: [Matches]
      summary: Apply one play mode to many matches at once
      description: |
        Sets `play_mode` to the same value on every key in
        `match_keys` inside one SQLite transaction. Same shape as
        `PUT /api/v1/matches/queue` — see that endpoint for the
        bulk-toolbar rationale.

        Empty `play_mode` (string `""`) clears the rows (bulk
        Clear), reverting every listed match to "follow the
        parser's data.playlist."

        Returns 204 on success, 400 on validation failure
        (`play_mode` outside the enum + non-empty), 500 on store
        error.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [match_keys, play_mode]
              properties:
                match_keys:
                  type: array
                  items:
                    type: string
                  description: |
                    The set of match_keys to write. May be empty
                    (no-op); duplicates within the slice are
                    tolerated.
                play_mode:
                  $ref: "#/components/schemas/PlayModeBulkEnum"
      responses:
        "204":
          description: All listed matches' play mode updated.
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/parses:
    post:
      operationId: ParseScreenshots
      tags: [Pipeline]
      summary: Run a one-shot parse
      description: |
        Walks the configured screenshots folder, OCRs anything not
        already in the DB, and writes the merged rows. Idempotent —
        re-running won't duplicate matches already on record.

        `?scope=all` switches into "re-parse all": every PNG in the
        watched folder gets re-OCR'd regardless of whether it's
        already in the per-type tables. Use after a parser-tightening
        release (e.g. the hero-fuzzy-match length-gate that stopped
        Miyazaki being attributed to Mei) to retroactively correct
        older rows. The Upsert clauses are idempotent on filename so
        existing rows are rewritten in place; match annotations /
        queue / play-mode overrides / hidden flags / reviews all key
        on match_key and survive the re-parse. ~1 s per screenshot.

        Runs the parse in a BACKGROUND goroutine and returns
        `202 Accepted` **immediately** — the request is not held open
        for the OCR loop. Subscribe to `GET /api/v1/events` for progress
        + completion (`parse-progress` / `parse-complete`), and poll
        `GET /api/v1/parses/active` to resync after a reconnect or page
        reload (SSE is not replayed). Re-fetch `GET /api/v1/matches` on
        completion.

        `409 Conflict` when a parse is already in flight (single-flight,
        fail-fast) or the screenshots folder is unset/unreadable.
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [new, all]
          description: |
            `new` (default) parses only files not in the DB.
            `all` re-OCRs every file. Other values return 400.
      responses:
        "202":
          description: Parse accepted and started; subscribe to events for progress + completion.
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/parses/active:
    get:
      operationId: GetActiveParse
      tags: [Pipeline]
      summary: Active-parse status snapshot
      description: |
        The resync anchor for the async parse pipeline. SSE messages are
        not replayed on connect, so a client that reconnects or reloads
        mid-parse reads this to restore "is a parse running, and how far
        along." `running=false` when idle.
      responses:
        "200":
          description: Current parse run-state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveParse"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: CancelParse
      tags: [Pipeline]
      summary: Stop an in-flight parse
      description: |
        Cancels the parse run currently in flight. The OCR loop reads
        the cancellation flag between screenshots, so the file
        currently in tesseract finishes before the loop unwinds —
        cancellation lands at the next between-files boundary, not
        synchronously with this response.

        Any per-screenshot rows already committed to SQLite stay put;
        a follow-up `GET /api/v1/matches` reflects the partial state.
        The frontend learns about completion via the SSE
        `parse-cancelled` event so it can flip the Stop button back
        to Run without polling.

        `202` on success, `409` when no parse is in flight.
      responses:
        "202":
          description: Cancellation signalled; SSE `parse-cancelled` follows once the loop unwinds.
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/screenshots/pending-count:
    get:
      operationId: GetPendingScreenshotCount
      tags: [Pipeline]
      summary: Count of screenshots awaiting parse
      description: |
        Returns the number of files in the configured folder that are
        not yet present in any per-screenshot-type table's `filename`.
      responses:
        "200":
          description: Count.
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count:
                    type: integer
                    minimum: 0
                    example: 3
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/screenshots/{filename}/ignore:
    parameters:
      - name: filename
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 200
          # Defense-in-depth: forbid path separators (/ \) and NUL so
          # the filename can never become a traversal-capable path
          # component in a future code path. The current handler
          # stores it as a SQL identifier only (no FS access), but
          # any future "delete the file from disk" feature inherits
          # this constraint by default. Pattern stays simple so
          # schemathesis's regex matcher agrees with the handler.
          pattern: '^[^/\\\x00]{1,200}$'
        example: "broken.png"
        description: |
          Screenshot filename to suppress or un-suppress. URL-encoded
          (the filename can contain spaces and dashes from the
          Overwatch capture format).
    put:
      operationId: IgnoreScreenshot
      tags: [Pipeline]
      summary: Permanently ignore a screenshot
      description: |
        Adds `filename` to the suppress-list backing the Unknown
        tab's "Delete forever" affordance. Future parse runs skip
        this file. Also wipes any `unmatched-<filename>` or
        `ambiguous-<filename>` match rows so the row disappears from
        the result set immediately, not just on the next parse. The
        on-disk file is **not** deleted.

        Idempotent: ignoring an already-ignored filename refreshes
        the timestamp. PUT (not POST) — the operation has no body
        and re-issuing is a no-op past the timestamp refresh.
      responses:
        "204":
          description: Filename added to the ignore-list.
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: UnignoreScreenshot
      tags: [Pipeline]
      summary: Remove a screenshot from the ignore-list
      description: |
        Removes `filename` from the suppress-list so the next parse
        run re-ingests the file. Idempotent on filenames that
        weren't ignored.

        No production UI surface ships against this verb in PR 4; it
        exists for completeness and future "Manage ignored" panels.
      responses:
        "204":
          description: Filename removed from the ignore-list.
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/screenshots/ignored:
    get:
      operationId: GetIgnoredScreenshots
      tags: [Pipeline]
      summary: List ignored screenshots with timestamps
      description: |
        Returns every ignored row with its `ignored_at` timestamp,
        most-recently-ignored first. Backs the Settings → Advanced →
        Manage ignored files panel and is also useful for support /
        curl consumers.
      responses:
        "200":
          description: List of ignored screenshots.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IgnoredScreenshot"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: ClearIgnoredScreenshots
      tags: [Pipeline]
      summary: Bulk truncate the suppress list
      description: |
        Removes every row from `ignored_screenshots`. The Settings
        panel's "Re-enable all" action calls this. Idempotent — returns
        204 even when the list is already empty. The next Parse run
        re-discovers every previously-ignored file from disk (the
        on-disk files were never moved).
      responses:
        "204":
          description: Suppress list cleared.
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/settings/screenshots-folder:
    get:
      operationId: GetScreenshotsFolder
      tags: [Settings]
      summary: Get the configured screenshots folder
      description: |
        Returns the path Recall is currently reading from. Can be
        absolute (e.g. `/Users/.../Overwatch/ScreenShots/Overwatch`) or
        relative to the server's working directory.
      responses:
        "200":
          description: Current path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderPath"
    put:
      operationId: SetScreenshotsFolder
      tags: [Settings]
      summary: Set the screenshots folder
      description: |
        Persists to `settings.json` and re-targets the file watcher if
        it's armed. Path can be absolute or relative to the server's
        working directory.

        Validation (400 on failure):
        - Only filesystem-safe characters (alphanumerics, `_ . / \ : - <space>
          ( ) + ' ,`). Shell metacharacters, NUL bytes, and control codes
          are rejected.
        - Must be in canonical form — `filepath.Clean(path) == path`
          (no redundant slashes or `..` traversal segments).
        - Must point at an existing directory.

        The echoed-back `path` is the cleaned form actually stored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  minLength: 1
                  example: /Users/jacob/Documents/Overwatch/ScreenShots/Overwatch
      responses:
        "200":
          description: New path echoed back.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderPath"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: ResetScreenshotsFolder
      tags: [Settings]
      summary: Clear the configured screenshots folder
      description: |
        Symmetric with `DELETE /api/v1/settings/tesseract` — the user-
        set override is the thing being deleted. There's no platform
        default to fall back to; the natural empty state is "no folder
        configured" and the user re-picks via Detect / Change.

        Also tears down the file watcher if it was armed against the
        now-cleared path so we don't leak an fsnotify handle pointing
        at an orphaned dir.
      responses:
        "204":
          description: Cleared.
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/settings/tesseract:
    get:
      operationId: GetTesseractSettings
      tags: [Settings]
      summary: Get the OCR engine status
      description: |
        Reports the configured Tesseract path, whether it resolves to a
        working binary, the reported version, whether that version is
        officially supported (5.x only), the platform default path, and
        any error from the last detection attempt.

        When `found` is true but `supported` is false (e.g. a 3.x or
        4.x binary), the UI shows a caution banner and prompts for
        confirmation before running a parse — results may be incorrect
        with unsupported versions.
      responses:
        "200":
          description: Current engine status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TesseractStatus"
    put:
      operationId: SetTesseractPath
      tags: [Settings]
      summary: Set the Tesseract binary path
      description: |
        Re-runs detection on the new path. The status returned reflects
        whether the binary at that path responds to `--version`.

        Validation (400 on failure — the path is rejected before
        `exec.Command` is invoked, so a malformed path never reaches a
        syscall):
        - Only filesystem-safe characters (alphanumerics, `_ . / \ : - <space>
          ( ) + ' ,`). Shell metacharacters, NUL bytes, and control codes
          are rejected.
        - Must be in canonical form — `filepath.Clean(path) == path`.
        - Must be an absolute path.
        - Basename must be exactly `tesseract` or `tesseract.exe` — this
          pins the endpoint to "swap which Tesseract is used" and
          forbids using it to launch arbitrary binaries.

        `DELETE /api/v1/settings/tesseract` bypasses this validation
        because the platform default (`defaultTesseractPath()`) is
        trusted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  minLength: 1
                  example: /opt/homebrew/bin/tesseract
      responses:
        "200":
          description: Re-detected status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TesseractStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: ResetTesseractPath
      tags: [Settings]
      summary: Reset the Tesseract path to the platform default
      description: |
        Replaces the configured path with the platform default (Homebrew
        on macOS, `/usr/bin/tesseract` on Linux, the Windows installer
        path on Windows) and re-runs detection. Modeled as a DELETE
        because it removes the user-set override, returning the field
        to its implicit default.
      responses:
        "200":
          description: Re-detected status against the default path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TesseractStatus"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/settings/watcher:
    get:
      operationId: GetWatchEnabled
      tags: [Settings]
      summary: Get the file-watcher toggle
      description: |
        `true` iff the fsnotify watcher is armed against the configured
        screenshots folder.
      responses:
        "200":
          description: Current state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnabledFlag"
    put:
      operationId: SetWatchEnabled
      tags: [Settings]
      summary: Toggle the file watcher
      description: |
        When on, new `.png` / `.jpg` files in the configured folder are
        auto-parsed after a 60s debounce. Requires a working Tesseract
        binary — turning it on without one returns 500.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnabledFlag"
      responses:
        "204":
          description: Toggle applied.
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/profiles:
    get:
      operationId: GetProfiles
      tags: [Profiles]
      summary: List all known profiles and which is active
      description: |
        Each profile gets its own settings + SQLite DB under
        `<base>/profiles/<name>/`. The masthead switcher chip
        renders the list and highlights the active one.
      responses:
        "200":
          description: Active + list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilesResponse"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: CreateProfile
      tags: [Profiles]
      summary: Create a new profile and activate it
      description: |
        Creates the profile directory, adds it to the list, and
        activates it in one shot. The app tears down the active store
        and re-initializes against the new profile's directory before
        the response returns — so callers can re-fetch all data
        immediately afterward (or window.location.reload() the SPA).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: |
                    Profile name. Filesystem-safe.
                  pattern: '^[a-zA-Z0-9][a-zA-Z0-9_-]{0,39}$'
                  example: "alt"
      responses:
        "201":
          description: Created and activated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/profiles/test/seed:
    post:
      operationId: SeedTestProfile
      tags: [Profiles]
      x-internal: true
      summary: Create and seed the sample "test" profile
      description: |
        Onboarding helper: creates the sample `test` profile (if absent)
        and seeds it with ~500 synthetic matches over the rolling
        last-8-months window so the guided walkthrough can run on real
        data. Idempotent — an already-seeded `test` is reused untouched
        (`already_seeded: true`). Does NOT switch the active profile; the
        caller does that with `PUT /api/v1/profiles/active`.
      responses:
        "200":
          description: The sample profile is seeded (or was already).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeedTestProfileResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/profiles/active:
    put:
      operationId: SwitchProfile
      tags: [Profiles]
      summary: Switch the active profile
      description: |
        Tears down the App's in-memory state tied to the previous
        profile (settings, store, watcher, metrics endpoint) and
        re-initializes everything against the new profile's directory.
        The wire response carries the new state so the caller can update
        UI without a round-trip.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "main"
      responses:
        "200":
          description: Switched.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/profiles/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
    put:
      operationId: RenameProfile
      tags: [Profiles]
      summary: Rename a profile
      description: |
        Renames the on-disk directory + updates `profiles.json`. If
        the renamed profile is the active one, the in-memory store is
        closed before the directory rename and re-opened against the
        new path so settings + DB carry through transparently. Returns
        the updated active + list.

        Idempotent when `new_name == old`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_name]
              properties:
                new_name:
                  type: string
                  description: |
                    New profile name. Same regex as creation:
                    `^[a-zA-Z0-9][a-zA-Z0-9_-]{0,39}$`.
                  example: "silentstorm"
      responses:
        "200":
          description: Renamed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: A profile with that new name already exists.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: DeleteProfile
      tags: [Profiles]
      summary: Delete a non-active profile and wipe its directory
      description: |
        Removes the profile from the list AND removes its directory
        tree (including the SQLite DB + settings) from disk. The
        active profile cannot be deleted — callers must
        `PUT /api/v1/profiles/active` to a different profile first.
      responses:
        "204":
          description: Deleted.
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Profile is active; switch away first.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/matches/transfers:
    post:
      operationId: MoveMatches
      tags: [Matches]
      summary: Bulk move matches from the active profile to another profile
      description: |
        Transfers every row keyed on `match_keys` (across all 5 parent
        screenshot tables) + annotations + the `hidden_matches` flag
        from the active profile's DB into `target_profile`'s DB, then
        hard-deletes from the source. The target's `screenshots_dirs`
        id space is independent from the source's, so per-row
        `screenshots_dir_id` is re-resolved against the target by path.

        Two-phase: target writes succeed first; source delete happens
        second. A retry on the same keys after a mid-transfer failure
        re-targets the already-moved rows (idempotent via
        `ON CONFLICT(filename)`) and completes the source delete.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [match_keys, target_profile]
              properties:
                match_keys:
                  # `null` is treated as an empty list — the request
                  # short-circuits to a no-op (204). Individual `null`
                  # entries inside the array are still rejected (400);
                  # see derefStringArray in pkg/cmd/server.go.
                  type: array
                  items:
                    type: string
                target_profile:
                  type: string
      responses:
        "204":
          description: Move complete.
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: target_profile is the active profile.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/system/startup-error:
    get:
      operationId: GetStartupError
      tags: [System]
      summary: Surface a captured startup failure
      description: |
        Returns the captured Startup error message, or empty when boot
        was clean. The frontend polls this on mount and renders a
        blocking modal when non-empty so the user sees a real reason
        instead of a flash-and-disappear window. Always 200 — the
        empty-string case is the load-bearing default the client
        keys off.
      responses:
        "200":
          description: Captured startup error message (empty on clean boot).
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    description: |
                      Empty when Startup completed without capturing an
                      error; otherwise the wrapped failure string in
                      the format `startup: <stage>: <inner>`.
                    example: ""

  /api/v1/system/version:
    get:
      operationId: GetVersion
      tags: [System]
      summary: App build version
      description: |
        Returns the version string injected at build time via
        `-ldflags "-X recall/pkg/app.Version=<tag>"`.
        Falls back to `"dev"` for local builds outside the release pipeline.
      responses:
        "200":
          description: Current build version.
          content:
            application/json:
              schema:
                type: object
                required: [version]
                properties:
                  version:
                    type: string
                    example: 0.0.13-beta.0

  /api/v1/system/update:
    get:
      operationId: CheckForUpdate
      tags: [System]
      summary: Check for a newer release
      description: |
        Queries the GitHub releases API for the latest stable release and
        compares it against the running build version. Returns
        `available: false` when already up to date, running a dev build,
        or when the API is unreachable (network failures are silenced).
      responses:
        "200":
          description: Update availability info.
          content:
            application/json:
              schema:
                type: object
                required: [checked, dev_build, available, latest, url]
                properties:
                  checked:
                    type: boolean
                    description: |
                      True when a GitHub API call completed successfully.
                      False on network failure — show nothing in that case.
                    example: true
                  dev_build:
                    type: boolean
                    description: |
                      True when the running version is a dev build. The
                      latest release is then informational context, not an
                      upgrade prompt.
                    example: false
                  available:
                    type: boolean
                    description: |
                      True when the latest release is newer than the running
                      version (only meaningful when dev_build=false).
                    example: true
                  latest:
                    type: string
                    example: 0.0.15
                  url:
                    type: string
                    example: https://github.com/sound-barrier/recall/releases/tag/v0.0.15
                  latest_heroes:
                    type: array
                    description: |
                      Display names from the upcoming release's
                      `recall-<version>-heroes.yaml` asset, verified
                      against the published SHA-256 sidecar. Empty
                      when the YAML fetch fails, the sidecar
                      mismatches, or the upgrade isn't applicable
                      (current build is already the latest). The
                      frontend's Unknown-tab "Reference data gaps"
                      section pivots this into a per-card "Update to
                      v<X> to recognise <name>" CTA.
                    items: { type: string }
                  latest_maps:
                    type: array
                    description: |
                      Display names from the upcoming release's
                      `recall-<version>-maps.yaml` asset — same
                      lifecycle as latest_heroes.
                    items: { type: string }
                  latest_sources:
                    type: array
                    description: |
                      Screenshot-source names extracted from the
                      release's `recall-<version>-screenshot_sources.yaml`
                      asset. Used by the update-check modal to surface
                      newly-supported capture tools.
                    items: { type: string }
                  last_checked_at:
                    type: string
                    format: date-time
                    description: |
                      RFC3339 timestamp recording when this install
                      last received a successful CheckForUpdate
                      response. Drives the "haven't checked in a
                      while" banner. Empty on the very first check.
                  release_notes:
                    type: string
                    description: |
                      First ~500 chars of the GitHub release `body`
                      (Markdown source), surfaced in the update-check
                      modal under a "more on GitHub" link. The frontend
                      interpolates this via Vue's default escaping —
                      never `v-html`.
                  game_data:
                    $ref: "#/components/schemas/GameDataStatus"

  /api/v1/system/data-update:
    post:
      operationId: ApplyGameDataUpdate
      tags: [System]
      summary: Download + apply the latest game data (no binary update)
      description: |
        Downloads `heroes.yaml`, `maps.yaml`, and
        `screenshot_sources.yaml` from the Pages-published `main`
        channel at https://sound-barrier.github.io/recall/data/,
        verifies each against its published SHA-256 sidecar,
        atomically writes them to `<RECALL_DATA_DIR>/data/`, and
        swaps the parser dataset in-process. No binary update
        required — the user can recognise newly-shipped heroes /
        maps / capture-tool grammars by clicking Apply, without
        re-installing Recall.

        Always pulls from `main` (the freshest data channel). Users
        who want release-tagged YAML just upgrade the Recall binary,
        which re-bundles the same files.

        Returns 422 if any asset's SHA-256 sidecar fails verification;
        500 on I/O failure; 502 if Pages is unreachable.
      responses:
        "200":
          description: Update applied; diff of what changed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataUpdateResult"
        "422":
          $ref: "#/components/responses/SHAVerificationFailed"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/v1/system/data-location:
    get:
      operationId: GetDataLocation
      tags: [System]
      summary: Report the on-disk paths used by this install
      description: |
        Surface the SQLite database path, settings file path, base
        data directory, and the currently-configured screenshots
        folder. Honors the `RECALL_DATA_DIR` env override (set in
        mise.toml `[env]` for `wails dev`), so the response matches what
        the running app actually reads/writes.
      responses:
        "200":
          description: Path inventory.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataLocation"

  /api/v1/system/reference-data:
    get:
      operationId: GetReferenceData
      tags: [System]
      summary: Overwatch reference data (hero roster + map roster)
      description: |
        Returns the static reference data baked into the parser at
        compile time from `pkg/parser/heroes.yaml` and
        `pkg/parser/maps.yaml`. Stable across an app session — the
        frontend may fetch once at load and cache. Source-of-truth
        for UI surfaces that render canonical Blizzard spelling
        (diacritics + capitalization preserved) and group heroes by
        role / maps by game mode.
      responses:
        "200":
          description: The embedded OW reference data.
          content:
            application/json:
              schema:
                type: object
                required: [heroes_by_role, maps_by_game_mode, screenshot_sources]
                properties:
                  heroes_by_role:
                    type: object
                    description: Hero names grouped by role, alphabetised within each role.
                    additionalProperties:
                      type: array
                      items: { type: string }
                    example:
                      tank: [Doomfist, "D.va", Reinhardt]
                      dps: [Ashe, Genji, Tracer]
                      support: [Ana, Juno, Mercy]
                  maps_by_game_mode:
                    type: object
                    description: Map names grouped by game mode, alphabetised within each.
                    additionalProperties:
                      type: array
                      items: { type: string }
                    example:
                      control: ["Antarctic Peninsula", Busan, Nepal]
                      escort: [Dorado, "Watchpoint Gibraltar"]
                      hybrid: ["King's Row", Midtown]
                  screenshot_sources:
                    type: array
                    description: |
                      Per-capture-tool filename grammars the parser
                      recognises. Source-of-truth is
                      `pkg/parser/screenshot_sources.yaml`. Surfaced
                      in Settings → Advanced → "Supported capture-
                      source rules" so the user can verify which
                      filename shapes work without leaving the app.
                    items:
                      type: object
                      required: [name, prefix, regex, year_offset, example]
                      properties:
                        name:        { type: string, description: "Stable id (nvidia / prntscn / snip / …)." }
                        prefix:      { type: string, description: "Fast strings.HasPrefix gate." }
                        regex:       { type: string, description: "Anchored Go regex; six capture groups (y, m, d, H, M, S)." }
                        year_offset: { type: integer, description: "Added to the captured year (2-digit YAML → 2000)." }
                        example:     { type: string, description: "Canonical example filename." }

  /api/v1/system/screenshots-folder-candidates:
    get:
      operationId: GetScreenshotsFolderCandidates
      tags: [System]
      summary: List the Windows screenshot-source picker candidates
      description: |
        Returns the four canonical Windows capture-source locations
        (Nvidia Overlay, OW PrntScn default, Win Snip tool, Steam
        install) so the first-run Settings empty-state can render a
        2 × 2 picker grid. Each entry carries the resolved first
        existing path variant for that source plus an `exists` flag
        so the UI can render missing-path cards as grayed-with-
        tooltip without a second round-trip.

        Returns an empty array on macOS / Linux — auto-detect is
        Windows-only by current product decision; the frontend
        hides the grid on those platforms and falls back to the
        existing "Pick your screenshots folder…" button.
      responses:
        "200":
          description: |
            Per-source candidate list. Empty array on non-Windows
            platforms.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NamedCandidate"

  /api/v1/system/screenshots-folder-candidates/stats:
    get:
      operationId: GetScreenshotsFolderCandidateStats
      tags: [System]
      x-internal: true
      summary: Per-source diagnostic stats for the picker grid
      description: |
        Walks the first-existing path of each candidate source and
        returns the file count, last-write timestamp, and the count
        of files whose names match the parser's recognised filename
        grammars. Surfaced as a second metadata line on each picker
        card — "47 files · 2h ago" / "0 files" / "12 files · 0
        recognised" — so the user instantly knows which source their
        captures are landing in.

        Decoupled from the picker's primary fetch because the dir
        walk can spin for a few seconds on a synced cloud folder
        with thousands of unrelated entries. The frontend issues
        this AFTER the cards mount so the grid renders snappy and
        the per-card stats line hydrates when the response lands.

        Walk is bounded to 1000 entries per source. Returns an empty
        array on macOS / Linux (same Windows-only contract as the
        plain candidates endpoint).
      responses:
        "200":
          description: |
            Per-source stats list. Empty array on non-Windows
            platforms. Each entry's `last_modified` is empty when
            the source folder has no regular files.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [name, file_count, last_modified, recognised_count]
                  properties:
                    name:             { type: string, description: "Stable source id — matches the candidates endpoint." }
                    file_count:       { type: integer, description: "Regular files in the source dir, bounded to 1000." }
                    last_modified:    { type: string, description: "RFC3339 UTC of the most-recent write. Empty when no files." }
                    recognised_count: { type: integer, description: "Subset of file_count whose name matches one of the parser's filename grammars." }

  /api/v1/system/tesseract-probe:
    get:
      operationId: ProbeTesseractBinary
      tags: [System]
      x-internal: true
      summary: Probe the OS for an installed Tesseract binary
      description: |
        Walks an ordered list of per-platform candidate paths
        (Homebrew + MacPorts on macOS; apt / snap / Flatpak on Linux;
        Program Files + Chocolatey + per-user AppData + scoop on
        Windows) and returns the first one that resolves to a working
        Tesseract 5.x binary. Falls back to `PATH` lookup if none of
        the well-known locations match.

        Each candidate is validated via the same `--version` check as
        `GET /api/v1/settings/tesseract` so a forgotten 3.x install
        on `PATH` doesn't "succeed" while producing wrong OCR output.

        Read-only — does not persist. The caller (UI Detect button)
        decides whether to apply the discovered path via
        `PUT /api/v1/settings/tesseract`.
      responses:
        "200":
          description: |
            Probe result. `found: true` carries the discovered path;
            `found: false` includes the full `tried` list for the
            user to inspect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeResult"

  /api/v1/system/screenshots-folder-reveal:
    post:
      operationId: RevealScreenshotsFolder
      tags: [System]
      summary: Open the configured screenshots folder in the host OS file manager
      description: |
        Action endpoint — the effect (a Finder / Explorer / xdg-open
        window appearing on the server's host) is out-of-band relative
        to the HTTP response. The opener choice is per-platform:

          * macOS:   `open <path>`
          * Linux:   `xdg-open <path>`
          * Windows: `explorer <path>`

        The path is the in-memory `settings.ScreenshotsDir`, re-
        validated via the same `validateScreenshotsDir` boundary used
        by `PUT /api/v1/settings/screenshots-folder` before reaching
        the shell. Replaces an earlier frontend behavior that called
        `BrowserOpenURL('file://…')`, which Wails v2.12 rejects with
        "scheme not allowed".

        No request body — the configured folder is the only thing
        this action can reveal, so passing an arbitrary path would
        widen the attack surface for no UX gain.
      responses:
        "202":
          description: Opener spawned.
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/database:
    get:
      operationId: BackupDatabase
      tags: [Backup]
      summary: Download a complete native SQLite snapshot of the database
      description: |
        Streams a consistent, compacted snapshot of the entire local
        database (produced with `VACUUM INTO`). Unlike a per-table export
        it captures every table verbatim — reviews, the ignored and
        all-heroes lists, ambiguous candidates — so it is a true backup.
        Restore it with `PUT /api/v1/database`.
      responses:
        "200":
          description: Native SQLite database snapshot.
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="recall-backup-20260626-013000.db"'
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: A SQLite database file.
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      operationId: RestoreDatabase
      tags: [Backup]
      summary: Restore the local database from a native SQLite snapshot
      description: |
        REPLACES the entire local database with the uploaded `.db`
        snapshot (as produced by `GET /api/v1/database`). The candidate is
        validated read-only before any destructive step, so an invalid
        upload leaves the running database untouched.

        Rejections: a file that is not a usable Recall database is `422`;
        a parse in flight is `409`. Callers should surface a confirmation
        step — this is a full replace.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: A SQLite database file produced by `GET /api/v1/database`.
      responses:
        "204":
          description: Database restored.
        "409":
          description: A parse is in flight; retry once it completes.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "422":
          description: The uploaded file is not a usable Recall database.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/exports/bundle:
    post:
      operationId: ExportBundle
      tags: [Backup]
      summary: Build a selection-aware export bundle (ZIP)
      description: |
        Builds a `.zip` containing the existing `recall-export/v1`
        JSON (filtered to the requested matches) at `data.json`, every
        referenced screenshot under `screenshots/<filename>`, and a
        root `manifest.json` listing screenshot → match_key mappings
        for sanity-checking after restore.

        The `match_keys` body field carries the user's explicit
        selection. `include_unknown` adds every record whose
        `data.map` is empty (the same "unknown" definition the
        Matches view uses); `include_hidden` adds every record
        currently in `hidden_matches`. Toggles UNION onto the
        explicit selection — a request with `match_keys: []` and
        `include_hidden: true` exports every hidden match.

        Merge into another install via `POST /api/v1/imports` — the
        `data.json` shape is the `recall-export/v1` envelope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [match_keys]
              properties:
                match_keys:
                  type: array
                  items:
                    type: string
                  description: |
                    Explicit list of match_keys to include in the
                    bundle. Empty array combined with
                    `include_unknown=false` and
                    `include_hidden=false` produces an empty
                    bundle (manifest with `match_count: 0`).
                include_unknown:
                  type: boolean
                  default: false
                  description: |
                    Add every record whose `data.map` is empty (the
                    Matches view's "unknown" filter).
                include_hidden:
                  type: boolean
                  default: false
                  description: |
                    Add every record currently in `hidden_matches`.
      responses:
        "200":
          description: |
            ZIP bundle with a `Content-Disposition: attachment;
            filename="recall-bundle-<timestamp>.zip"` header.
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/imports:
    post:
      operationId: ImportMatches
      tags: [Backup]
      summary: Merge matches from a previously-exported bundle
      description: |
        Merges the matches in an uploaded `recall-bundle/v1` ZIP (as
        produced by `POST /api/v1/exports/bundle`) into the local
        database. ADDITIVE — a match whose key already exists locally is
        skipped, and nothing is ever wiped. Only the bundle's parsed rows
        (`data.json`) are imported; the embedded screenshot images are
        ignored (data-only).

        Payload-level failures (not a ZIP, unreadable archive, missing
        manifest/data.json) are rejected with `400`; semantic failures
        (unsupported bundle schema) with `409`. Existing data is left
        untouched in both rejection paths.

        For a full-fidelity backup/restore (every table, including edits
        and review state) use `GET` / `PUT /api/v1/database` instead.
      requestBody:
        required: true
        content:
          application/zip:
            schema:
              type: string
              format: binary
              description: A recall-bundle/v1 ZIP from POST /api/v1/exports/bundle.
      responses:
        "200":
          description: Merge applied; counts of added vs skipped matches.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportSummary"
        "400":
          description: |
            Payload was not a readable Recall bundle (not a ZIP, archive
            open failure, missing or undecodable manifest/data.json).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: |
            The bundle was readable but its schema is unsupported by this
            build.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/events:
    get:
      operationId: Events
      tags: [Events]
      summary: Server-Sent Events stream
      description: |
        Long-lived `text/event-stream` connection. Subscribers receive:
          * `parse-progress` — fired per OCR'd file during a parse run,
            carries `{done, total, filename, screenshot_type, match_key?, data?, error?, matches_updated?, hero_corrections?, map_corrections?}`.
            `match_key` is the resolved key for the just-inserted row
            (present on post-insert events; absent on the mid-OCR
            preview event). `error` is set when that single file failed
            to parse; the batch continues to the next file regardless,
            so the client should render a warning without aborting the
            in-flight UI. `matches_updated` / `hero_corrections` /
            `map_corrections` are cumulative re-parse counters since
            the run began; absent (zero) on a regular parse run, so
            consumers that ignore them are unaffected.
          * `match-updated` — fired immediately after each successful
            per-screenshot insert, carrying the fully-aggregated
            `MatchRecord` for the affected `match_key`. Lets the
            frontend incrementally render the Matches list as a parse
            run progresses (upsert by `match_key`). Same shape as one
            element of `GET /api/v1/matches`. May fire multiple
            times for the same match within a single parse batch as
            additional screenshots refine its fields.
          * `parse-complete` — fired after a parse run finishes
          * Keepalive comment lines every 25 s so reverse proxies
            don't close the connection

        Clients should reconnect on disconnect; messages are not
        replayed. After reconnect, the client should re-fetch
        `GET /api/v1/matches` as the authoritative reconciliation.
      responses:
        "200":
          description: SSE stream.
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: parse-progress
                  data: {"done":1,"total":5,"filename":"...png","screenshot_type":"teams"}

                  event: match-updated
                  data: {"match_key":"match-2026-05-10T21-29-28","source_files":["...png"],"data":{...}}

                  event: parse-complete
                  data: {}

  /_screenshot/{filename}:
    get:
      operationId: GetScreenshot
      tags: [Assets]
      summary: Serve a screenshot image from the configured folder
      description: |
        Streams a file from the configured screenshots directory. The
        `{filename}` parameter must be a plain basename; path traversal
        (`..`, `/`, `\`) is rejected. Used by the frontend to render
        `<img>` previews without round-tripping bytes through the JSON
        bridge. Sits outside `/api/v1/` because it serves binary
        content, not JSON resources.
      parameters:
        - in: path
          name: filename
          required: true
          schema:
            type: string
          description: URL-encoded basename of a file in the screenshots folder.
          example: Overwatch%202%20Screenshot%202026.05.10%20-%2021.49.34.41.png
      responses:
        "200":
          description: Image bytes.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
        "400":
          description: Malformed path or filename.
        "404":
          description: File not found, no folder configured, or path traversal rejected.

components:
  parameters:
    MatchKey:
      in: path
      name: match_key
      required: true
      schema:
        type: string
        minLength: 1
      description: |
        Match identity — same `match_key` value exposed in
        `MatchRecord`. URL-safe: the canonical form replaces every
        legacy colon separator with a dash, so no percent-encoding
        is required for paste-in-URL use
        (e.g. `match-2026-05-10T22-21-11`). For `unmatched-<filename>`
        and `ambiguous-<filename>` variants the embedded filename
        still needs the usual encoding for spaces / unicode.
      example: "match-2026-05-10T22-21-11"

  schemas:
    ProblemDetails:
      type: object
      required: [type, title, status]
      description: |
        RFC 9457 (Problem Details for HTTP APIs) error body, returned as
        `application/problem+json` for every 4xx/5xx the API surfaces. `type`
        is a stable URI under
        `https://github.com/sound-barrier/recall/problems/` that clients can
        switch on; `instance` is the request path. Members beyond those listed
        here are RFC 9457 §3.2 extension members (the schema stays open).
      properties:
        type:
          type: string
          format: uri
          description: A URI identifying the problem class.
          example: https://github.com/sound-barrier/recall/problems/invalid-body
        title:
          type: string
          description: Short, human-readable summary of the problem class.
          example: Bad Request
        status:
          type: integer
          description: The HTTP status code, duplicated in the body for convenience.
          example: 400
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          description: The request path that produced the problem.
        errors:
          type: array
          description: |
            §3.2 extension — per-field validation failures, present on a
            malformed request body.
          items:
            $ref: "#/components/schemas/FieldError"
        failed_assets:
          type: array
          description: |
            §3.2 extension — the asset(s) whose SHA-256 sidecar verification
            failed (the data-update 422).
          items:
            type: string
    FieldError:
      type: object
      required: [field, detail]
      description: One offending request field and why it was rejected.
      properties:
        field:
          type: string
          description: The request-body field name.
        detail:
          type: string
          description: Why the field was rejected.
    ActiveParse:
      type: object
      required: [running, done, total, scope]
      description: |
        Snapshot of the in-flight parse run. The resync anchor for the
        async parse pipeline — read after an SSE reconnect or a page
        reload to restore the parse panel without replaying events.
      properties:
        running:
          type: boolean
          description: Whether a parse is currently in flight.
        done:
          type: integer
          minimum: 0
          description: Screenshot files OCR'd so far this run.
        total:
          type: integer
          minimum: 0
          description: Total files to process this run (0 when idle).
        scope:
          type: string
          description: '"new" (default parse) or "all" (re-parse); empty when idle.'
    LeaverEnum:
      type: string
      enum: ["", "self", "team", "enemy"]
      description: |
        Per-match leaver tag — who left the match.
        - `self`: the user left (their data is incomplete).
        - `team`: an ally left.
        - `enemy`: an opponent left.
        - `""` (empty string): no leaver tag set; functionally
          identical to omitting the field. Sending the empty string
          to the single-set endpoint is equivalent to a DELETE on
          the field.

    QueueTypeEnum:
      type: string
      enum: ["role", "open"]
      description: |
        Queue format the match was played in. The single-set
        `PUT /matches/{match_key}/queue` endpoint only accepts
        non-empty values; revert to "queue not set" via the matching
        DELETE.

    QueueTypeBulkEnum:
      type: string
      enum: ["role", "open", ""]
      description: |
        Same as `QueueTypeEnum` plus the empty-string sentinel for
        the bulk endpoint. Empty string clears every listed match's
        queue row (bulk Clear); the single-set DELETE doesn't apply
        to multi-match writes, so the same effect rides through the
        bulk endpoint via this enum value.

    PlayModeEnum:
      type: string
      enum: ["quickplay", "competitive"]
      description: |
        Play-mode override for one match. The single-set
        `PUT /matches/{match_key}/play-mode` endpoint only accepts
        non-empty values; revert to "follow parser" via the matching
        DELETE.

    PlayModeBulkEnum:
      type: string
      enum: ["quickplay", "competitive", ""]
      description: |
        Same as `PlayModeEnum` plus the empty-string sentinel for the
        bulk endpoint. Empty string clears every listed match's
        play-mode override (bulk Clear).

    MatchSourceEnum:
      type: string
      enum: ["ocr", "ocr_edited", "manual"]
      description: |
        Provenance of a match record.
        - `ocr`: parsed from screenshots, unedited.
        - `ocr_edited`: parsed, then user-corrected via the override
          layer (`PUT /matches/{match_key}/data`). `edited_fields` lists
          the overridden paths.
        - `manual`: hand-entered (`POST /matches`); no screenshot rows.

    ResultEnum:
      type: string
      enum: ["victory", "defeat", "draw"]
      description: Match outcome.

    UserMatchDataInput:
      type: object
      description: |
        Full user override set for `PUT /matches/{match_key}/data`. Inline
        edits send the whole current set; a per-field revert is the same
        request with that field omitted. A scalar present (even `0` / `""`)
        means "override to this value"; omitting it means "use the OCR
        value". Kept separate from the parsed rows, so a `DELETE` on the
        same path restores the original.
      properties:
        map:
          type: string
        hero:
          type: string
        # Combat scalars carry a generous maximum so a spec-valid override can't
        # exceed Go's int range and 400 on decode (no real match approaches it).
        eliminations:
          type: integer
          minimum: 0
          maximum: 1000000
        assists:
          type: integer
          minimum: 0
          maximum: 1000000
        deaths:
          type: integer
          minimum: 0
          maximum: 1000000
        damage:
          type: integer
          minimum: 0
          maximum: 1000000
        healing:
          type: integer
          minimum: 0
          maximum: 1000000
        mitigation:
          type: integer
          minimum: 0
          maximum: 1000000
        result:
          $ref: "#/components/schemas/ResultEnum"
        final_score:
          type: string
        date:
          type: string
        finished_at:
          type: string
        game_length:
          type: string
        rank:
          type: string
        # level / rank_progress mirror the bounds MatchResult enforces, so an
        # override that's valid on the wire stays valid in the response.
        level:
          type: integer
          minimum: 0
          maximum: 5
        rank_progress:
          type: integer
          minimum: 0
          maximum: 100
        change_percent:
          type: integer
          minimum: -1000000
          maximum: 1000000
        heroes:
          type: array
          description: |
            Heroes-played LIST override (position 0 = primary). Replaces
            the OCR roster wholesale when present.
          items:
            $ref: "#/components/schemas/UserHeroInput"
        hero_stats:
          type: array
          description: |
            Per-cell stat overrides, applied INDEPENDENTLY of the heroes
            list — a stat edit never implies a roster swap.
          items:
            $ref: "#/components/schemas/UserHeroStatInput"
        sr:
          type: array
          description: Per-hero SR overrides (editing an OCR rank screen).
          items:
            $ref: "#/components/schemas/UserHeroSRInput"
        modifiers:
          type: array
          items:
            type: string

    UserHeroInput:
      type: object
      required: [hero]
      properties:
        hero:
          type: string
        percent_played:
          type: integer
          minimum: 0
          maximum: 100
        play_time:
          type: string
        position:
          type: integer
          minimum: 0
          maximum: 100
          description: 0 = primary.

    UserHeroStatInput:
      type: object
      required: [hero, stat_key, value]
      properties:
        hero:
          type: string
        stat_key:
          type: string
          example: rip_tire_kill
        # Bounded so a spec-valid stat can't overflow Go's int on decode.
        value:
          type: integer
          minimum: 0
          maximum: 1000000

    UserHeroSRInput:
      type: object
      required: [hero, sr, change]
      properties:
        hero:
          type: string
        sr:
          type: integer
          minimum: 0
          maximum: 1000000
        change:
          type: integer
          minimum: -1000000
          maximum: 1000000

    ManualMatchInput:
      type: object
      required: [map, play_mode, queue_type, heroes, result]
      description: |
        Hand-entered match for users without OCR. The server derives the
        `match_key` from `played_at` (default: now) and returns the created
        MatchRecord. `heroes[0]` is the primary hero.
      properties:
        map:
          type: string
          minLength: 1
          example: ilios
        play_mode:
          $ref: "#/components/schemas/PlayModeEnum"
        queue_type:
          $ref: "#/components/schemas/QueueTypeEnum"
        heroes:
          type: array
          minItems: 1
          description: Heroes played; first is the primary (need not be ordered by play time).
          items:
            type: string
            minLength: 1
          example: [ana, kiriko]
        result:
          $ref: "#/components/schemas/ResultEnum"
        played_at:
          type: string
          format: date-time
          description: |
            When the match was played (RFC 3339). Defaults to now; drives
            the `match_key` plus `date` / `finished_at`.
          example: "2026-06-15T14:30:00Z"
        rank:
          $ref: "#/components/schemas/ManualRankInput"
        leaver:
          $ref: "#/components/schemas/LeaverEnum"
        replay_code:
          type: string
          description: Optional Overwatch replay code; written to the match annotation.
          example: A1B2C3
        note:
          type: string
          description: Optional free-form note; written to the match annotation.
        tags:
          type: array
          description: Optional free-form tags; written to the match annotation.
          items:
            type: string
          example: [clutch, stream]
        members:
          type: array
          description: |
            The squad / group the user played with; written to the match
            annotation (stored verbatim, so `Apollo#11234` keeps its case).
          items:
            type: string

    ManualRankInput:
      type: object
      description: Competitive rank the match ended on. Omit for quickplay.
      properties:
        tier:
          type: string
          example: platinum
        division:
          type: integer
          minimum: 1
          maximum: 5
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: "% into the division."
        change_percent:
          type: integer
          minimum: -1000000
          maximum: 1000000
          description: "% gained / lost this match."
        demotion_protection:
          type: boolean

    IgnoredScreenshot:
      type: object
      required: [filename, ignored_at]
      properties:
        filename:
          type: string
          minLength: 1
          maxLength: 200
          example: "summary-2026-05-10T22-21-11.png"
          description: |
            Filename the suppress-list keys on. Same shape as the
            `filename` path parameter on the per-file ignore endpoints.
        ignored_at:
          type: string
          example: "2026-05-10T22:21:11Z"
          description: |
            Server-assigned timestamp captured when the row was added.
            ISO 8601 (RFC 3339); SQLite's `CURRENT_TIMESTAMP` rounds to
            the nearest second so two ignores within the same second
            share an identical value and tie-break on filename ASC.

    FolderPath:
      type: object
      required: [path]
      properties:
        path:
          type: string
          example: /Users/jacob/Documents/Overwatch/ScreenShots/Overwatch
          description: |
            The configured screenshots folder. The GET response can
            return an empty string when no folder has been configured;
            the PUT request body inlines its own minLength: 1 schema.

    ProbeResult:
      type: object
      required: [found, tried]
      properties:
        found:
          type: boolean
          description: True when at least one candidate directory existed.
        path:
          type: string
          description: |
            First existing candidate path. Empty when `found` is false.
          example: /Users/jacob/Documents/Overwatch/ScreenShots/Overwatch
        tried:
          type: array
          items:
            type: string
          description: |
            Ordered list of candidate paths inspected by the probe.
            Useful diagnostic when `found` is false — surfaces "we
            looked here and here" rather than a generic miss.
          example:
            - /Users/jacob/Documents/Overwatch/ScreenShots/Overwatch
            - /Users/jacob/Documents/Blizzard/Overwatch/ScreenShots/Overwatch

    NamedCandidate:
      type: object
      required: [name, label, path, exists]
      description: |
        One entry in the Windows screenshot-source picker. Each card
        the user sees corresponds to one canonical capture method.
      properties:
        name:
          type: string
          enum: [nvidia, prntscn, snip, steam]
          description: |
            Stable identifier — `nvidia` (Nvidia Overlay), `prntscn`
            (OW PrntScn default), `snip` (Win Snip tool), `steam`
            (Steam-installed OW). Frontend keys cards off this.
        label:
          type: string
          description: |
            Human-readable display label rendered as the card title
            ("Nvidia Overlay", "OW default", etc.).
        path:
          type: string
          description: |
            Resolved first-existing path variant for this source.
            When no variant exists, lifts to the canonical first
            path so the "not found" card still has a path to
            display.
          example: C:\Users\Jacob\Videos\Overwatch
        exists:
          type: boolean
          description: |
            True iff the resolved `path` is a real directory the
            current process can stat. Drives the card's status dot
            (green when true, gray when false) and whether clicking
            it commits the path via PUT
            /api/v1/settings/screenshots-folder.

    RosterDiff:
      type: object
      required: [has_update]
      description: |
        Shared base for the game-data status type. Carries the diff
        fields (added/removed × heroes/maps/sources) + `has_update`
        so consumers don't repeat the same six array fields.
        `GameDataStatus` extends this with the applied-commit
        identifier via `allOf`.
      properties:
        has_update:
          type: boolean
          description: |
            True when the channel's published version differs from
            the version applied on disk. Always true when nothing
            has been applied yet (no manifest entry for this
            channel).
        added_heroes: { type: array, items: { type: string } }
        removed_heroes: { type: array, items: { type: string } }
        added_maps: { type: array, items: { type: string } }
        removed_maps: { type: array, items: { type: string } }
        added_sources: { type: array, items: { type: string } }
        removed_sources: { type: array, items: { type: string } }

    GameDataStatus:
      description: |
        Comparison between the user's currently-loaded game data
        (heroes / maps / capture-tool sources) and the live main
        channel published at https://sound-barrier.github.io/recall/data/.
        `commit_sha` is the 7-char short SHA from the Pages-published
        `data/version.json`; empty means the Pages fetch failed (the
        FE shows a "main unreachable" state). `applied_commit` is
        empty when the user has never applied an update (the install
        is on the binary's embedded data). `has_update` is true when
        commit_sha != applied_commit.
      allOf:
        - $ref: "#/components/schemas/RosterDiff"
        - type: object
          required: [commit_sha, applied_commit]
          properties:
            commit_sha:
              type: string
              description: |
                7-char short SHA of the currently-published main
                commit. Empty means the main channel was unreachable.
              example: abc1234
            committed_at:
              type: string
              format: date-time
              description: |
                ISO 8601 committer date from the Pages-published
                version.json — surfaced as "main @ abc1234 · 2 d ago"
                in the modal.
            applied_commit:
              type: string
              description: |
                7-char short SHA from the manifest's
                applied_main_commit field. Empty when the user has
                never applied an update.
            applied_at:
              type: string
              format: date-time
              description: RFC3339 timestamp of the last successful apply.

    DataUpdateResult:
      type: object
      required: [applied_commit]
      description: |
        Returned by POST /api/v1/system/data-update on success. Lists
        the actual differences applied — the modal renders these as
        the success-state summary.
      properties:
        applied_commit:
          type: string
          description: |
            7-char short commit SHA from Pages-published
            data/version.json that the apply pulled from.
          example: abc1234
        added_heroes: { type: array, items: { type: string } }
        removed_heroes: { type: array, items: { type: string } }
        added_maps: { type: array, items: { type: string } }
        removed_maps: { type: array, items: { type: string } }
        added_sources: { type: array, items: { type: string } }
        removed_sources: { type: array, items: { type: string } }

    DataLocation:
      type: object
      required: [base_dir, settings_path, database_path]
      properties:
        base_dir:
          type: string
          description: |
            Root directory Recall reads/writes from. Honors
            `RECALL_DATA_DIR`; otherwise the platform user-config
            directory.
          example: /Users/jacob/Library/Application Support/Recall
        settings_path:
          type: string
          description: Absolute path to `settings.json`.
          example: /Users/jacob/Library/Application Support/Recall/settings.json
        database_path:
          type: string
          description: Absolute path to the SQLite database file.
          example: /Users/jacob/Library/Application Support/Recall/db/recall.db
        screenshots_dir:
          type: string
          description: |
            Currently-configured screenshots folder. Empty string
            when not yet set.
          example: /Users/jacob/Documents/Overwatch/Screenshots

    ImportSummary:
      type: object
      description: |
        Outcome of a merge import (`POST /api/v1/imports`): how many
        matches were added versus skipped because their key already
        existed locally.
      required: [imported, skipped]
      properties:
        imported:
          type: integer
          minimum: 0
          description: Matches added to the local database.
        skipped:
          type: integer
          minimum: 0
          description: Matches skipped because their key already existed.

    MatchRecord:
      type: object
      description: |
        One match — assembled by JOINing the per-screenshot-type rows
        that share the same `match_key`. Identity is `match_key`; no
        separate `id` exists because no single row underlies a match
        anymore.
      required: [match_key, source_files, data]
      properties:
        match_key:
          type: string
          description: |
            Stable identity. Either `match-<ISO-timestamp>` (from the
            earliest screenshot's filename, with all date/time
            separators normalised to `-` so the whole key is URL-safe
            without encoding) or `unmatched-<filename>` for files
            whose names didn't parse as timestamps.
          example: "match-2026-05-10T22-21-11"
        source_files:
          type: array
          description: Every screenshot filename that fed this match.
          items:
            type: string
          example:
            - Overwatch Screenshot 2026.05.10 - 22.21.11.79.png
            - Overwatch Screenshot 2026.05.10 - 22.21.57.34.png
        source_types:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ScreenshotType"
          description: |
            Per-source-file screenshot classification. Populated at
            parse time. May be absent on rows parsed before this column
            landed.
          example:
            "Overwatch Screenshot 2026.05.10 - 22.21.11.79.png": teams
            "Overwatch Screenshot 2026.05.10 - 22.21.57.34.png": rank
        source_parsed_at:
          type: object
          additionalProperties:
            type: string
            format: date-time
          description: |
            Per-source-file timestamp (ISO8601) of when each screenshot
            was first inserted into the DB. Stable across subsequent
            re-parses of the same match. May be absent on rows / files
            persisted before this column landed.
          example:
            "Overwatch Screenshot 2026.05.10 - 22.21.11.79.png": "2026-05-10T22:30:00Z"
            "Overwatch Screenshot 2026.05.10 - 22.21.57.34.png": "2026-05-10T22:30:00Z"
        source_dir_ids:
          type: object
          additionalProperties:
            type: integer
            format: int64
          description: |
            Per-source-file screenshots_dirs row id the file was ingested
            from. Frontends build `/_screenshot/{dir_id}/{filename}` URLs
            from this map so the screenshot handler can serve the right
            directory even after the user changes their screenshots
            folder (re-install, move, profile switch). Absent for rows
            where the dir was unset at parse time; clients should send
            `0` to fall back to the currently-configured screenshots
            folder.
          example:
            "Overwatch Screenshot 2026.05.10 - 22.21.11.79.png": 3
            "Overwatch Screenshot 2026.05.10 - 22.21.57.34.png": 3
        thumbnail_file:
          type: string
          description: |
            The source filename whose image is actually present on disk and
            best represents the match (SUMMARY, else TEAMS, else any source
            file) — the one the leaf-row hover preview should show. Resolved
            at read time against the live filesystem. Absent when no source
            image exists on disk (a manual match, a data-only import, or a
            screenshot that was deleted or moved); clients must not request a
            `/_screenshot/...` URL for the match in that case.
          example: "Overwatch Screenshot 2026.05.10 - 22.21.11.79.png"
        parsed_at:
          type: string
          format: date-time
          description: |
            Match-level timestamp (ISO8601) of when the match record
            was first inserted into the DB. Stable across subsequent
            re-parses so the UI can display "parsed on X" without the
            value shifting when a later screenshot is added.
          example: "2026-05-10T22:30:00Z"
        data:
          $ref: "#/components/schemas/MatchResult"
        source:
          $ref: "#/components/schemas/MatchSourceEnum"
        edited_fields:
          type: array
          description: |
            Dotted paths of fields the user overrode on an OCR match
            (e.g. `data.damage`,
            `data.heroes_played.junkrat.stats.rip_tire_kill`), so the UI
            can mark each with a revert affordance. Absent for pure OCR
            and for manual matches — the Manual badge conveys provenance.
          items:
            type: string
          example: ["data.map", "data.damage"]
        annotation:
          $ref: "#/components/schemas/MatchAnnotation"
        hidden:
          type: boolean
          description: |
            True iff the user soft-deleted this match via
            `PUT /api/v1/matches/{match_key}/visibility`. Omitted (or
            false) for normal records. The per-screenshot parent rows
            are untouched — only the aggregator hides the surface.
        reviewed_by:
          type: string
          enum: [self, coach]
          description: |
            Who reviewed this match's VOD: `self` (the user) or
            `coach` (a coach). Omitted entirely when the match has
            not been reviewed (the implicit third state). Set via
            `PUT /api/v1/matches/{match_key}/review`, cleared via
            `DELETE` on the same path.
        reviewed_at:
          type: string
          format: date-time
          description: |
            Server-stamped timestamp of the last review-status
            upsert. Drives the dossier's "days since last review"
            widget. Omitted when the match is unreviewed.
        queue_type:
          allOf:
            - $ref: "#/components/schemas/QueueTypeEnum"
          description: |
            Queue format the match was played in: `role` (5v5 role
            queue) or `open` (6v6 open queue). Auto-detected from the
            teams players-per-team count; a user override set
            via `PUT /api/v1/matches/{match_key}/queue` takes
            precedence, and `DELETE` on the same path reverts to the
            detected value. Omitted entirely when neither a detection
            nor an override exists.
        play_mode:
          allOf:
            - $ref: "#/components/schemas/PlayModeEnum"
          description: |
            Match's play mode: `quickplay` (casual) or `competitive`
            (ranked). Set ONLY from the `match_play_mode` user-
            override aux table — parser-written `data.playlist` and
            rank-row presence do not surface here. New matches
            default to "Not set" until the user explicitly toggles
            via the right-panel radiogroup; omitted from JSON when
            no override row exists.
        ambiguous:
          type: boolean
          description: |
            True iff the resolver couldn't pin this screenshot to a
            single match (EAD signature match in the 5-30 min
            ambiguous window, or multiple candidates inside 30 min).
            The `match_key` carries the `ambiguous-<filename>`
            sentinel and the `candidates` array lists the possible
            matches the user can pick from in the Unknown tab.
        candidates:
          type: array
          description: |
            Candidate matches this ambiguous screenshot could belong
            to. Only present when `ambiguous=true`. Sorted by
            `distance_seconds` ascending.
          items:
            $ref: "#/components/schemas/AmbiguousCandidate"

    AmbiguousCandidate:
      type: object
      required: [match_key, distance_seconds]
      description: |
        One candidate match an ambiguous screenshot could belong to.
        Populated by the resolver when EAD-bridge ambiguity is
        detected; surfaced to the user in the Unknown tab.
      properties:
        match_key:
          type: string
          description: The candidate match's `match_key`.
          example: "match-2026-05-10T21-29-28"
        distance_seconds:
          type: integer
          description: |
            |Δt| between the ambiguous screenshot's filename timestamp
            and the candidate match's anchor timestamp, in seconds.
          example: 720
        representative_source_file:
          type: string
          description: |
            One source file from the candidate match (its earliest
            screenshot) so the picker UI can render a thumbnail next
            to the candidate. Omitted when the candidate match is not
            present in the current result set (e.g. hidden when
            show-hidden is off).
          example: "Overwatch 2026.05.10 - 21.29.28.01_summary.png"
        representative_dir_id:
          type: integer
          format: int64
          description: |
            `screenshots_dirs` row id that owns
            `representative_source_file`. Pairs with the filename to
            build a `/_screenshot/<id>/<filename>` URL. Omitted when
            the file is missing or zero.
          example: 1

    MatchAnnotation:
      type: object
      required: [leaver]
      description: |
        User-curated per-match metadata embedded in a `MatchRecord`.
        `leaver` is always present; `note` / `replay_code` / `members` /
        `tags` are omitted when empty (the server marshals them
        `omitempty`). The row only exists in the database if at least one
        field carries content; absence of the row is signalled by a 404
        on `GET /api/v1/matches/{match_key}/annotation`, and the whole
        annotation object is omitted from `MatchRecord` when the match is
        unannotated.
      properties:
        leaver:
          $ref: "#/components/schemas/LeaverEnum"
        note:
          type: string
          description: Free-text per-match commentary.
        replay_code:
          type: string
          description: Overwatch six-character replay ID. Stored verbatim.
        members:
          type: array
          description: BattleTags of group members for this match.
          items:
            type: string
            example: "Apollo#11234"
        tags:
          type: array
          description: |
            Free-form match labels (lowercase, deduped). `stack`,
            `stream`, `placement` are the conventional three; users
            can add anything. Drives the FilterRail "Tags" filter.
          items:
            type: string
            example: stack
        annotated_at:
          type: string
          format: date-time
          description: Server-set timestamp of when the annotation was last upserted.

    ScreenshotType:
      type: string
      enum: [summary, teams, personal, rank, all_heroes, unknown]
      description: |
        Classification of one screenshot:
          * `summary` — post-match SUMMARY tab
          * `teams` — in-game or post-match TEAMS screen
          * `personal` — post-match PERSONAL tab
          * `rank` — competitive RANK PROGRESS screen
          * `all_heroes` — the PERSONAL "All Heroes" aggregate view.
            Recognized but deliberately not stored (its totals duplicate
            the TEAMS screen and its stat-card icons defeat the OCR), so
            it appears in the live parse-progress event but never in a
            match's `source_types`.
          * `unknown` — the OCR classifier couldn't pick a type from
            the file. Surfaced in the Unknown tab for triage; the
            row's per-screenshot data lives in `unknown_screenshots`
            until the user resolves it (re-OCR, manual attribution,
            or drop).

    MatchResult:
      type: object
      description: All parsed data for a match, merged across its source files.
      properties:
        map:        { type: string,  description: 'e.g. "rialto"' }
        map_raw:
          type: string
          description: |
            Raw OCR'd map-name text preserved when the matcher
            rejected the candidate as unknown (no canonical match in
            `pkg/parser/maps.yaml`). `map == "" && map_raw != ""`
            is the "Unknown map" signal that drives the leaf-row
            chip and detail-panel banner.
        game_mode:       { type: string,  description: 'e.g. "control"' }
        playlist:       { type: string,  enum: [competitive, quickplay, unranked, ""] }
        role:       { type: string,  enum: [tank, dps, support, ""] }
        hero:       { type: string,  description: "Primary (most-played) hero" }
        hero_raw:
          type: string
          description: |
            Raw OCR'd hero-name text preserved when the matcher
            rejected the candidate as unknown (no canonical match in
            `pkg/parser/heroes.yaml`). `hero == "" && hero_raw != ""`
            is the "Unknown hero" signal. A future YAML release that
            adds the hero is picked up at the next boot's
            re-aggregate without re-running Tesseract.
        eliminations: { type: integer, minimum: 0 }
        assists:      { type: integer, minimum: 0 }
        deaths:       { type: integer, minimum: 0 }
        damage:       { type: integer, minimum: 0 }
        healing:      { type: integer, minimum: 0 }
        mitigation:   { type: integer, minimum: 0 }
        result:
          type: string
          enum: [victory, defeat, draw, ""]
        final_score:
          type: string
          example: "3-1"
        date:
          type: string
          example: "2026-05-10"
        finished_at:
          type: string
          description: HH:MM 24h as shown by the OW client.
          example: "21:29"
        game_length:
          type: string
          example: "11:25"
        heroes_played:
          type: array
          items:
            $ref: "#/components/schemas/HeroPlay"
        performance:
          $ref: "#/components/schemas/Performance"
        rank:
          type: string
          example: platinum
        level:
          type: integer
          minimum: 0
          maximum: 5
        modifiers:
          type: array
          items:
            type: string
          example: [expected, victory]
        rank_progress:
          type: integer
          minimum: 0
          maximum: 100
        change_percent:
          type: integer
          description: Percentage the rank moved this match (signed).
        sr:
          type: array
          items:
            $ref: "#/components/schemas/HeroSR"

    HeroPlay:
      type: object
      # percent_played is optional: the PERSONAL sidebar roster knows a hero
      # by name but not its %; a real entry's % is always > 0.
      required: [hero]
      properties:
        hero:
          type: string
          example: lucio
        percent_played:
          type: integer
          minimum: 0
          maximum: 100
          example: 100
        play_time:
          type: string
          example: "11:25"
        stats:
          type: object
          additionalProperties:
            type: integer
          description: Hero-specific stats keyed by snake_case label.
          example:
            weapon_accuracy: 24
            players_saved: 6

    HeroSR:
      type: object
      required: [hero, sr, change]
      properties:
        hero:    { type: string,  example: lucio }
        sr:      { type: integer, example: 2754 }
        change:  { type: integer, description: "Signed delta this match", example: 30 }

    Performance:
      type: object
      properties:
        eliminations: { $ref: "#/components/schemas/PerformanceStat" }
        assists:      { $ref: "#/components/schemas/PerformanceStat" }
        deaths:       { $ref: "#/components/schemas/PerformanceStat" }

    PerformanceStat:
      type: object
      required: [total]
      properties:
        total:
          type: integer
        avg_per_10min:
          type: number
          format: double

    ProfilesResponse:
      type: object
      required: [active, profiles]
      properties:
        active:
          type: string
          description: The currently-active profile name.
          example: "main"
        profiles:
          type: array
          items:
            type: string
          description: |
            Every known profile name, sorted alphabetically (the
            order matches `slices.Sort` on the slice the
            `*Profiles.List` method returns).
          example: ["alt", "main"]

    SeedTestProfileResponse:
      type: object
      required: [profile, matches, already_seeded]
      properties:
        profile:
          type: string
          description: The seeded profile's name (always "test").
          example: "test"
        matches:
          type: integer
          description: Number of matches now in the sample profile.
          example: 500
        already_seeded:
          type: boolean
          description: |
            True when "test" already held matches and was reused untouched
            (no reseed); false when it was freshly seeded.

    TesseractStatus:
      type: object
      required: [path, found, version, supported, error, default, platform]
      properties:
        path:
          type: string
          description: The currently-configured path.
          example: /opt/homebrew/bin/tesseract
        found:
          type: boolean
          description: True iff `path` resolves to a working binary.
        version:
          type: string
          description: Tesseract `--version` output (e.g. "5.4.1"). Empty when not found.
        supported:
          type: boolean
          description: True iff the detected major version is 5.x (the only officially supported series).
        error:
          type: string
          description: Description of the last detection failure, if any.
        default:
          type: string
          description: Platform default path (Homebrew on macOS, /usr/bin on Linux, etc.).
        platform:
          type: string
          description: |
            Host's `runtime.GOOS` value — `darwin`, `linux`, `windows`,
            `freebsd`, etc. The frontend uses it to surface only the
            install-path guidance that matches the host, instead of
            listing every OS in one confusing paragraph.
          example: darwin

    EnabledFlag:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

  responses:
    BadRequest:
      description: Malformed request body or query parameters.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    NotFound:
      description: The requested resource was not found.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Conflict:
      description: |
        The request was syntactically valid, but the resource state or
        a payload value prevents the action (e.g. duplicate profile
        name, screenshots directory not configured, invalid Tesseract
        binary path, non-candidate resolution target).
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    InternalError:
      description: Unhandled server-side error.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    BadGateway:
      description: |
        An upstream fetch failed — e.g. the Pages-published data-update
        channel is unreachable. No server state was modified.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    SHAVerificationFailed:
      description: |
        SHA-256 sidecar verification failed on at least one asset.
        Nothing was written to disk. Returned by endpoints that
        atomically apply downloaded reference data (e.g.
        `POST /api/v1/system/data-update`) when the bytes received
        don't match the published sidecar. The failing asset(s) are
        listed in the problem's `failed_assets` extension member.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          example:
            type: https://github.com/sound-barrier/recall/problems/data-verification-failed
            title: Unprocessable Entity
            status: 422
            detail: "data update: SHA-256 verification failed: heroes.yaml"
            instance: /api/v1/system/data-update
            failed_assets: [heroes.yaml]
