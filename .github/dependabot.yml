version: 2
updates:
  # Go modules — updates go.mod deps and the `go X.Y` toolchain directive.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns: ["*"]
    # Major version bumps require deliberate review — keep them out of the
    # grouped weekly PR so they surface individually with clear context.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # npm (Vue frontend) — Vue, Vite, typescript-eslint, vue-tsc, vitest, etc.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflow pins (setup-go, setup-node, checkout, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  # Docker base images in Dockerfile.build
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      docker-images:
        patterns: ["*"]
