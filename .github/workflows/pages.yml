# Publish three artifacts to GitHub Pages:
#
#   1. The user-facing documentation book (Honkit) — built from
#      book/ + the staged-in docs/*.md chapters. Lives at the Pages
#      root: https://sound-barrier.github.io/recall/
#
#   2. The Swagger UI rendering of api/openapi.yaml. Lives at
#      https://sound-barrier.github.io/recall/api/ — same URL the
#      book's sidebar "API reference" link points at.
#
#   3. The live reference-data channel: heroes.yaml + maps.yaml +
#      screenshot_sources.yaml + per-file .sha256 sidecars +
#      version.json (commit SHA + ISO timestamp). Lives at
#      https://sound-barrier.github.io/recall/data/. Consumed by
#      Recall's "Sync from main" path in the update modal so users
#      can pick up new heroes/maps/capture-tool grammars between
#      release tags without a binary upgrade. SHA-256 sidecars use
#      the same `<64-char hex>  <filename>` format the release flow
#      publishes (parser-side `verifySha256` checks them).
#
# Auto-deploys whenever the book scaffold, the docs/ chapters, the
# spec, the parser YAML rosters, or this workflow itself changes on
# main.
#
# One-time setup: Repo Settings → Pages → Build and deployment →
# Source = "GitHub Actions". Without it, deploy-pages fails with
# "Get Pages site failed".
#
# Security note on the one ${{ }} expansion below: page_url is a step
# output from actions/deploy-pages — generated inside this workflow,
# not a webhook payload field. Not an injection vector.

name: Pages

on:
  push:
    branches: [main]
    # Skip the deploy when only Go / Vue / Docker / tests change.
    paths:
      - 'api/openapi.yaml'
      - 'docs/**'
      - 'book/**'
      - 'testdata/**'
      - 'pkg/parser/heroes.yaml'
      - 'pkg/parser/maps.yaml'
      - 'pkg/parser/screenshot_sources.yaml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages best practice: only one in-flight deploy, but never cancel
# a running deploy — cancellation can leave the live site mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

# Honkit pin (HONKIT_VERSION) lives in mise.toml [env], shared with the
# `task pages-build` target. mise-action loads it into $GITHUB_ENV below.

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      # node (for the Honkit npx build) from mise.toml's pin; also loads
      # mise.toml [env] (HONKIT_VERSION) into $GITHUB_ENV so the build step
      # below interpolates the same version a local `task pages-build` uses.
      # `task check-deps` validates the pin against upstream.
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
        with:
          install_args: node

      # Stage book/ + the five chapter copies into a fresh build
      # directory so the committed book/ stays pure metadata. Two
      # reasons this matters:
      #   1. Honkit reads .gitignore from its source dir and skips
      #      matching files. If chapter filenames are listed in
      #      book/.gitignore (so local preview doesn't dirty git),
      #      Honkit silently produces a 1-page book.
      #   2. Keeping source and derived files separate makes the
      #      build idempotent and removes any "did I forget to
      #      clean up after preview" ambiguity.
      - name: Stage book build directory
        run: |
          mkdir -p _stage/book
          cp -R book/. _stage/book/
          cp docs/install-macos.md        _stage/book/install-macos.md
          cp docs/install-linux.md        _stage/book/install-linux.md
          cp docs/install-windows.md      _stage/book/install-windows.md
          cp docs/how-it-works.md         _stage/book/how-it-works.md
          cp docs/settings-reference.md   _stage/book/settings-reference.md
          cp docs/filtering.md            _stage/book/filtering.md
          cp docs/unknown-screenshots.md  _stage/book/unknown-screenshots.md
          cp docs/server.md               _stage/book/server.md
          cp docs/docker.md               _stage/book/docker.md
          cp docs/grafana.md              _stage/book/grafana.md
          cp docs/feedback.md             _stage/book/feedback.md
          cp docs/faq.md                  _stage/book/faq.md
          # Mirror testdata/ into the staged book so how-it-works.md's
          # example-screenshot images resolve via the same
          # `testdata/foo.png` relative path used in the README.
          mkdir -p _stage/book/testdata
          cp testdata/*.png _stage/book/testdata/
          # Same pattern for the in-app UI screenshots embedded near
          # the top of how-it-works.md (and reused at the top of the
          # README). Reference as `screenshots/foo.png` from chapters
          # in docs/ — the relative path resolves identically in
          # GitHub-rendered docs/ and in the staged Honkit book root.
          mkdir -p _stage/book/screenshots
          cp docs/screenshots/*.png _stage/book/screenshots/
          # The committed .gitignore lists no chapter filenames (the
          # docs are the source of truth), but blow it away inside
          # the staging dir to be defensive against future drift.
          rm -f _stage/book/.gitignore

      # Honkit resolves SUMMARY.md chapter paths relative to its
      # working directory, not the source arg, so run from inside
      # the staged book dir.
      - name: Build the book (Honkit)
        working-directory: _stage/book
        run: npx --yes "honkit@${HONKIT_VERSION}" build . _book

      # Final Pages tree:
      #   _site/                — book index.html + per-chapter HTML
      #   _site/api/index.html  — Swagger UI shell
      #   _site/api/openapi.yaml — the spec the shell loads
      #   _site/data/<name>.yaml + <name>.yaml.sha256 — live reference
      #                                                 data channel
      #   _site/data/version.json — commit SHA + ISO timestamp
      - name: Stage site
        run: |
          mkdir -p _site
          cp -R _stage/book/_book/. _site/
          mkdir -p _site/api
          cp docs/api/index.html _site/api/index.html
          cp api/openapi.yaml    _site/api/openapi.yaml

      # Live reference-data channel. Each YAML is published with a
      # SHA-256 sidecar matching the format pkg/app/update.go's
      # verifySha256 consumes ("<64-char hex>  <filename>\n"). On
      # ubuntu-24.04 `sha256sum` ships in coreutils; macOS would need
      # `shasum -a 256` but pages.yml runs Linux only.
      - name: Stage live reference-data channel
        run: |
          mkdir -p _site/data
          for name in heroes.yaml maps.yaml screenshot_sources.yaml; do
            cp "pkg/parser/${name}" "_site/data/${name}"
            ( cd _site/data && sha256sum "${name}" > "${name}.sha256" )
          done
          # version.json lets the app surface "Applied main @ abc1234
          # · 2 days ago" in the update modal. committed_at uses the
          # current commit's author date (ISO 8601, UTC) so users can
          # see how stale main's roster is. ${GITHUB_SHA} is the
          # commit being deployed.
          committed_at="$(git -C . log -1 --format=%cI HEAD)"
          printf '{\n  "commit_sha": "%s",\n  "committed_at": "%s"\n}\n' \
            "${GITHUB_SHA}" "${committed_at}" > _site/data/version.json

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
