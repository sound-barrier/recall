name: Release

on:
  push:
    tags:
      - 'v*'

# contents: write  — create GitHub Releases and upload assets
# packages: write  — push container images to GHCR
permissions:
  contents: write
  packages: write

jobs:
  # ── Job 1: Docker-based builds (Linux + Windows Wails, all server binaries) ──
  # Runs on Ubuntu because Docker is available and all these targets either use
  # Docker internally or can be cross-compiled without the Apple SDK.
  build-docker:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@v6

      # BuildKit is needed for `--output type=local` in Dockerfile.build.
      - uses: docker/setup-buildx-action@v4

      - name: Build Linux/amd64 Wails app
        run: make build-linux

      - name: Build Windows/amd64 Wails app
        run: make build-windows

      - name: Build all server binaries (Linux, Windows, macOS arm64+amd64)
        run: make build-server-all

      - name: Package artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          PKG_VERSION="${VERSION#v}"

          # ── Linux Wails app — tarball ─────────────────────────
          mkdir -p _tar/recall-linux-amd64
          cp dist/linux/Recall _tar/recall-linux-amd64/recall
          tar -czf recall-linux-amd64.tar.gz -C _tar recall-linux-amd64

          # ── Linux Wails app — .deb (installs to /usr/local/bin/recall) ──
          mkdir -p _deb-recall/DEBIAN _deb-recall/usr/local/bin
          cp dist/linux/Recall _deb-recall/usr/local/bin/recall
          chmod 755 _deb-recall/usr/local/bin/recall
          printf 'Package: recall\nVersion: %s\nArchitecture: amd64\nMaintainer: Jacob Delgado <jacob.delgado@gmail.com>\nDescription: Recall - Overwatch 2 match history tracker\n Watches Overwatch 2 screenshots, OCRs them with Tesseract, and tracks match history.\n' \
            "${PKG_VERSION}" > _deb-recall/DEBIAN/control
          dpkg-deb --build _deb-recall recall-linux-amd64.deb

          # ── Linux server binary — tarball ─────────────────────
          mkdir -p _tar/recall-server-linux-amd64
          cp dist/server-linux/Recall-server _tar/recall-server-linux-amd64/recall-server
          tar -czf recall-server-linux-amd64.tar.gz -C _tar recall-server-linux-amd64

          # ── Linux server binary — .deb (installs to /usr/local/bin/recall-server) ──
          mkdir -p _deb-server/DEBIAN _deb-server/usr/local/bin
          cp dist/server-linux/Recall-server _deb-server/usr/local/bin/recall-server
          chmod 755 _deb-server/usr/local/bin/recall-server
          printf 'Package: recall-server\nVersion: %s\nArchitecture: amd64\nMaintainer: Jacob Delgado <jacob.delgado@gmail.com>\nDescription: Recall server - Overwatch 2 match history HTTP server\n Headless HTTP server that serves match history data and optional Prometheus metrics.\n' \
            "${PKG_VERSION}" > _deb-server/DEBIAN/control
          dpkg-deb --build _deb-server recall-server-linux-amd64.deb

          # ── Windows binaries ──────────────────────────────────
          cp dist/windows/Recall.exe                recall-windows-amd64.exe
          cp dist/server-windows/Recall-server.exe  recall-server-windows-amd64.exe

          # ── macOS server binaries — tarballs ──────────────────
          mkdir -p _tar/recall-server-macos-arm64 _tar/recall-server-macos-amd64
          cp dist/server-mac/Recall-server-arm64 _tar/recall-server-macos-arm64/recall-server
          cp dist/server-mac/Recall-server-amd64 _tar/recall-server-macos-amd64/recall-server
          tar -czf recall-server-macos-arm64.tar.gz -C _tar recall-server-macos-arm64
          tar -czf recall-server-macos-amd64.tar.gz -C _tar recall-server-macos-amd64

      - name: Upload Docker-built artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: |
            recall-linux-amd64.tar.gz
            recall-linux-amd64.deb
            recall-server-linux-amd64.tar.gz
            recall-server-linux-amd64.deb
            recall-windows-amd64.exe
            recall-server-windows-amd64.exe
            recall-server-macos-arm64.tar.gz
            recall-server-macos-amd64.tar.gz

  # ── Job 2: macOS Wails .app bundles (requires Apple SDK / Xcode CLT) ──
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: actions/setup-node@v6
        with:
          node-version: '26'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build macOS Wails app
        run: make build-mac

      # .app bundles are directories; zip them for distribution so the download
      # preserves file modes and resource forks. Separate arm64 and amd64 zips
      # let users download only the slice they need.
      - name: Zip .app bundles
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            dist/mac/Recall-arm64.app \
            recall-macos-arm64.zip
          ditto -c -k --sequesterRsrc --keepParent \
            dist/mac/Recall-amd64.app \
            recall-macos-amd64.zip

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mac-build
          path: |
            recall-macos-arm64.zip
            recall-macos-amd64.zip

  # ── Job 3: Build and push Linux server container image to GHCR ──
  # Uses GITHUB_TOKEN (auto-injected, repo-scoped, expires after run — no PAT needed).
  # Image: ghcr.io/<owner>/recall-server:<version>, <major>.<minor>, latest
  publish-container:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/recall-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push server container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.build
          target: server-container
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Create GitHub Release with all binaries attached ──
  # github.ref_name is used only in an `actions/` `with:` expression, not
  # interpolated into any run: shell command — safe from injection.
  release:
    needs: [build-docker, build-mac]
    runs-on: ubuntu-latest
    steps:
      # Download all artifacts into the current directory (merge-multiple flattens them).
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Tags like v0.0.1-beta or v1.0.0-rc1 contain a hyphen → prerelease.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            recall-linux-amd64.tar.gz
            recall-linux-amd64.deb
            recall-server-linux-amd64.tar.gz
            recall-server-linux-amd64.deb
            recall-windows-amd64.exe
            recall-server-windows-amd64.exe
            recall-macos-arm64.zip
            recall-macos-amd64.zip
            recall-server-macos-arm64.tar.gz
            recall-server-macos-amd64.tar.gz
