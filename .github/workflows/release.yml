name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual fallback for when the tag was created by release-please
  # using the default GITHUB_TOKEN -- GitHub deliberately does not
  # fire workflows on refs authored by GITHUB_TOKEN (loop guard), so
  # the push:tags trigger above never runs for those tags. From the
  # command line: `make release-fire TAG=vX.Y.Z` (wraps the gh CLI),
  # or from the UI: Release -> Run workflow -> pick the tag in the
  # "Use workflow from" dropdown. Every job in this file already
  # keys off github.ref_name, which is the tag name for both
  # triggers. No inputs declared, so nothing untrusted enters the
  # workflow context. See RELEASES.md "When release.yml does not
  # auto-fire" for the long-term fix.
  workflow_dispatch:

permissions: {}  # deny all by default; each job declares only what it needs

jobs:
  # ── Job 1: Docker-based builds (Linux + Windows Wails, all server binaries) ──
  # Runs on Ubuntu because Docker is available and all these targets either use
  # Docker internally or can be cross-compiled without the Apple SDK.
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # needed by Sigstore to mint a short-lived cert
      attestations: write  # needed to write SLSA provenance to the repo
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # BuildKit is needed for `--output type=local` in Dockerfile.build.
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Build Linux/amd64 Wails app
        run: make build-linux

      - name: Build Windows/amd64 Wails app
        run: make build-windows

      - name: Build all server binaries (Linux, Windows, macOS arm64)
        run: make build-server-all

      - name: Package artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          PKG_VERSION="${VERSION#v}"

          # ── Linux Wails app — tarball ─────────────────────────
          mkdir -p "_tar/recall-${PKG_VERSION}-linux-amd64"
          cp dist/linux/Recall "_tar/recall-${PKG_VERSION}-linux-amd64/recall"
          tar -czf "recall-${PKG_VERSION}-linux-amd64.tar.gz" -C _tar "recall-${PKG_VERSION}-linux-amd64"

          # ── Linux Wails app — .deb (installs to /usr/local/bin/recall) ──
          mkdir -p _deb-recall/DEBIAN _deb-recall/usr/local/bin
          cp dist/linux/Recall _deb-recall/usr/local/bin/recall
          chmod 755 _deb-recall/usr/local/bin/recall
          printf 'Package: recall\nVersion: %s\nArchitecture: amd64\nMaintainer: Jacob Delgado <jacob.delgado@gmail.com>\nDescription: Recall - Overwatch match history tracker\n Watches Overwatch screenshots, OCRs them with Tesseract, and tracks match history.\n' \
            "${PKG_VERSION}" > _deb-recall/DEBIAN/control
          dpkg-deb --build _deb-recall "recall-${PKG_VERSION}-linux-amd64.deb"

          # ── Linux server binary — tarball ─────────────────────
          mkdir -p "_tar/recall-server-${PKG_VERSION}-linux-amd64"
          cp dist/server-linux/Recall-server "_tar/recall-server-${PKG_VERSION}-linux-amd64/recall-server"
          tar -czf "recall-server-${PKG_VERSION}-linux-amd64.tar.gz" -C _tar "recall-server-${PKG_VERSION}-linux-amd64"

          # ── Linux server binary — .deb (installs to /usr/local/bin/recall-server) ──
          mkdir -p _deb-server/DEBIAN _deb-server/usr/local/bin
          cp dist/server-linux/Recall-server _deb-server/usr/local/bin/recall-server
          chmod 755 _deb-server/usr/local/bin/recall-server
          printf 'Package: recall-server\nVersion: %s\nArchitecture: amd64\nMaintainer: Jacob Delgado <jacob.delgado@gmail.com>\nDescription: Recall server - Overwatch match history HTTP server\n Headless HTTP server that serves match history data and optional Prometheus metrics.\n' \
            "${PKG_VERSION}" > _deb-server/DEBIAN/control
          dpkg-deb --build _deb-server "recall-server-${PKG_VERSION}-linux-amd64.deb"

          # ── Windows artifacts ─────────────────────────────────
          # Desktop: NSIS installer (replaces bare exe as the primary artifact)
          cp dist/windows/Recall-amd64-installer.exe "recall-${PKG_VERSION}-windows-amd64-installer.exe"
          cp dist/server-windows/Recall-server.exe   "recall-server-${PKG_VERSION}-windows-amd64.exe"

          # ── macOS server binary — tarball ─────────────────────
          mkdir -p "_tar/recall-server-${PKG_VERSION}-darwin-arm64"
          cp dist/server-mac/Recall-server-arm64 "_tar/recall-server-${PKG_VERSION}-darwin-arm64/recall-server"
          tar -czf "recall-server-${PKG_VERSION}-darwin-arm64.tar.gz" -C _tar "recall-server-${PKG_VERSION}-darwin-arm64"

      # Generate SLSA provenance attestations for every packaged artifact.
      # Attestations are stored in the repo's attestation store and can be
      # verified offline with: gh attestation verify <file> --repo sound-barrier/recall
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: |
            recall-*-linux-amd64.tar.gz
            recall-*-linux-amd64.deb
            recall-server-*-linux-amd64.tar.gz
            recall-server-*-linux-amd64.deb
            recall-*-windows-amd64-installer.exe
            recall-server-*-windows-amd64.exe
            recall-server-*-darwin-arm64.tar.gz

      - name: Upload Docker-built artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: binaries
          path: |
            recall-*-linux-amd64.tar.gz
            recall-*-linux-amd64.deb
            recall-server-*-linux-amd64.tar.gz
            recall-server-*-linux-amd64.deb
            recall-*-windows-amd64-installer.exe
            recall-server-*-windows-amd64.exe
            recall-server-*-darwin-arm64.tar.gz

  # ── Job 2: macOS Wails .app bundles (requires Apple SDK / Xcode CLT) ──
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.26'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '26'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build macOS Wails app
        run: make build-mac

      # DMG layout (what the user sees when they double-click the .dmg):
      #
      #     Recall          (the .app bundle, no -arm64 suffix —
      #                      the DMG filename already carries the
      #                      arch, the .app inside should not)
      #     Applications →  (symlink to /Applications so the user
      #                      can drag-install in one motion)
      #     README.txt      (drag-install steps + Gatekeeper
      #                      approval, because the binary is not
      #                      notarized and macOS 15+ removed the
      #                      old right-click-Open bypass)
      #
      # GITHUB_REF_NAME is the runner-injected ref name (the tag);
      # no ${{ }} webhook-payload expansion in this step.
      - name: Create DMG
        run: |
          PKG_VERSION="${GITHUB_REF_NAME#v}"

          mkdir -p dmg-staging
          cp -R dist/mac/Recall.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          cat > dmg-staging/README.txt <<'EOF'
          Welcome to Recall.

          INSTALL
          ─────────────────────────────────────────────────────────
          1. Drag "Recall" onto the "Applications" alias in this
             window.
          2. Eject this disk (right-click the Recall icon in
             Finder's sidebar → Eject) and open the Applications
             folder.

          FIRST LAUNCH — APPROVE THE APP
          ─────────────────────────────────────────────────────────
          Recall is not signed by an Apple Developer account, so
          macOS will block it on first launch. To approve it:

          1. Double-click Recall in Applications. macOS will show
             a "cannot be opened" dialog — dismiss it.
          2. Open the Apple menu → System Settings.
          3. Click "Privacy & Security" in the sidebar.
          4. Scroll down to the "Security" section.
          5. Find the message "Recall was blocked to protect your
             Mac" and click the "Open Anyway" button next to it,
             then confirm in the dialog that appears.

          You only need to do this once.

          More documentation:
            https://sound-barrier.github.io/recall/
          EOF

          hdiutil create -volname "Recall" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "recall-${PKG_VERSION}-darwin-arm64.dmg"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: recall-*-darwin-arm64.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: mac-build
          path: |
            recall-*-darwin-arm64.dmg

  # ── Job 3: Generate SBOM (Software Bill of Materials) ───────────────────
  # Syft scans Go module graph and npm dependency tree from the repo source
  # and emits a single SPDX JSON file attached to the release.
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Compute artifact version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          format: spdx-json
          output-file: recall-${{ steps.ver.outputs.version }}-sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sbom
          path: recall-${{ steps.ver.outputs.version }}-sbom.spdx.json

  # ── Job 4: Build and push Linux server container image to GHCR ──
  # Uses GITHUB_TOKEN (auto-injected, repo-scoped, expires after run — no PAT needed).
  # Image: ghcr.io/<owner>/recall-server:<version> (always), plus :<major>.<minor>
  # and :latest on stable releases only (prerelease tags skip both — see the
  # `enable=` guards in the metadata step below).
  publish-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write    # required by cosign for keyless OIDC signing
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/recall-server
          # Stable releases get the exact :{{version}} plus rolling :{{major}}.{{minor}}
          # and :latest tags. Prerelease tags (those containing a hyphen, e.g.
          # v0.1.0-beta.0) MUST get ONLY :{{version}} — the rolling tags are
          # supposed to track the most-recent stable, so a `docker pull
          # recall-server:latest` always lands on a non-prerelease build.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push server container
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          file: Dockerfile.build
          target: server-container
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sign each pushed tag with cosign keyless (Sigstore OIDC). The
      # workflow's own GitHub Actions identity is the signing identity;
      # users verify with:
      #   cosign verify ghcr.io/sound-barrier/recall-server:<tag> \
      #     --certificate-identity-regexp 'https://github.com/sound-barrier/recall/\.github/workflows/release\.yml@refs/tags/v.*' \
      #     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
      # See docs/docker.md for the full verification recipe.
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign container image (keyless via OIDC)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Sign each tag at the digest the push produced; signing by
          # digest (not tag) is what prevents a tag re-point from
          # accidentally invalidating the signature.
          for tag in ${TAGS}; do
            image="${tag%:*}@${DIGEST}"
            echo "::group::cosign sign ${image}"
            cosign sign --yes "${image}"
            echo "::endgroup::"
          done

      # GHCR packages default to private for new packages. Explicitly set public
      # so users can pull without authentication. Detects user vs org owner automatically.
      - name: Set container image visibility to public
        continue-on-error: true  # GITHUB_TOKEN lacks write:packages OAuth scope for visibility changes; set public manually in Package settings once
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER_TYPE=$(gh api "/repos/$GITHUB_REPOSITORY" --jq '.owner.type')
          if [ "$OWNER_TYPE" = "Organization" ]; then
            API_PATH="/orgs/$GITHUB_REPOSITORY_OWNER/packages/container/recall-server"
          else
            API_PATH="/user/packages/container/recall-server"
          fi
          # Retry up to 5 times — package registry may not be indexed immediately after push.
          for i in 1 2 3 4 5; do
            if gh api --method PATCH -H "Accept: application/vnd.github+json" \
              "$API_PATH" -f visibility=public; then
              break
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

  # ── Job 5: Create GitHub Release with all binaries attached ──
  # github.ref_name is used only in an `actions/` `with:` expression, not
  # interpolated into any run: shell command — safe from injection.
  release:
    needs: [build-docker, build-mac, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write    # needed by Sigstore to mint a short-lived cert
      attestations: write  # needed to write SLSA provenance for sha256 files
    steps:
      # Download all artifacts into the current directory (merge-multiple flattens them).
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          merge-multiple: true

      # Per-artifact .sha256 files for every release binary and package.
      # Each file contains the SHA256 hash of exactly one artifact.
      # Users verify with: sha256sum --check recall-<version>-linux-amd64.tar.gz.sha256
      # On macOS:         shasum -a 256 --check recall-<version>-darwin-arm64.dmg.sha256
      - name: Generate SHA256 checksums
        run: |
          for f in recall-*.tar.gz recall-*.deb recall-*.exe recall-*.dmg; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256"
          done

      # Attest the sha256 files so users can prove the checksums themselves
      # came from CI, not a tampered release page. Chain:
      #   gh attestation verify <file>.sha256 → sha256sum --check <file>.sha256
      # This closes the loop: even the fallback verification path is signed.
      - name: Attest SHA256 checksums
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: |
            recall-*.tar.gz.sha256
            recall-*.deb.sha256
            recall-*.exe.sha256
            recall-*.dmg.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          # Tags like v0.0.1-beta or v1.0.0-rc1 contain a hyphen → prerelease.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            recall-*.tar.gz
            recall-*.tar.gz.sha256
            recall-*.deb
            recall-*.deb.sha256
            recall-*.exe
            recall-*.exe.sha256
            recall-*.dmg
            recall-*.dmg.sha256
            recall-*-sbom.spdx.json
