name: Release

on:
  push:
    tags:
      - 'v*'

# contents: write  — create GitHub Releases and upload assets
# packages: write  — push container images to GHCR
permissions:
  contents: write
  packages: write

jobs:
  # ── Job 1: Docker-based builds (Linux + Windows Wails, all server binaries) ──
  # Runs on Ubuntu because Docker is available and all these targets either use
  # Docker internally or can be cross-compiled without the Apple SDK.
  build-docker:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@v4

      # BuildKit is needed for `--output type=local` in Dockerfile.build.
      - uses: docker/setup-buildx-action@v3

      - name: Build Linux/amd64 Wails app
        run: make build-linux

      - name: Build Windows/amd64 Wails app
        run: make build-windows

      - name: Build all server binaries (Linux, Windows, macOS arm64+amd64)
        run: make build-server-all

      - name: Rename artifacts to release names
        run: |
          cp dist/linux/Recall                       Recall-linux-amd64
          cp dist/windows/Recall.exe                 Recall-windows-amd64.exe
          cp dist/server-linux/Recall-server         Recall-server-linux-amd64
          cp dist/server-windows/Recall-server.exe   Recall-server-windows-amd64.exe
          cp dist/server-mac/Recall-server-arm64     Recall-server-macos-arm64
          cp dist/server-mac/Recall-server-amd64     Recall-server-macos-amd64

      - name: Upload Docker-built artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: |
            Recall-linux-amd64
            Recall-windows-amd64.exe
            Recall-server-linux-amd64
            Recall-server-windows-amd64.exe
            Recall-server-macos-arm64
            Recall-server-macos-amd64

  # ── Job 2: macOS Wails universal .app (requires Apple SDK / Xcode CLT) ──
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build macOS universal Wails app
        run: make build-mac

      # .app bundles are directories; zip them for distribution so the download
      # preserves file modes and resource forks.
      - name: Zip .app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            dist/mac/Recall.app \
            Recall-macos-universal.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: mac-build
          path: Recall-macos-universal.zip

  # ── Job 3: Build and push Linux server container image to GHCR ──
  # Uses GITHUB_TOKEN (auto-injected, repo-scoped, expires after run — no PAT needed).
  # Image: ghcr.io/<owner>/recall-server:<version>, <major>.<minor>, latest
  publish-container:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/recall-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push server container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.build
          target: server-container
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Create GitHub Release with all binaries attached ──
  # github.ref_name is used only in an `actions/` `with:` expression, not
  # interpolated into any run: shell command — safe from injection.
  release:
    needs: [build-docker, build-mac]
    runs-on: ubuntu-latest
    steps:
      # Download all artifacts into the current directory (merge-multiple flattens them).
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tags like v0.0.1-beta or v1.0.0-rc1 contain a hyphen → prerelease.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            Recall-linux-amd64
            Recall-windows-amd64.exe
            Recall-macos-universal.zip
            Recall-server-linux-amd64
            Recall-server-windows-amd64.exe
            Recall-server-macos-arm64
            Recall-server-macos-amd64
