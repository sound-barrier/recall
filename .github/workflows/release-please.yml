name: release-please

# release-please reads conventional-commit messages on main, opens a PR
# that bumps the version + regenerates CHANGELOG.md, and — when that
# PR merges — this workflow pushes the `vX.Y.Z` tag and explicitly
# triggers release.yml. The GitHub Release itself is created by
# release.yml; release-please is configured with
# `skip-github-release: true` so it manages PRs only.
#
# So the flow is:
#   1. Conventional commits land on main (enforced by lefthook commit-msg).
#   2. release-please-action opens/updates a release PR with version bump
#      + changelog.
#   3. Maintainer merges the release PR.
#   4. The "Push tag for merged release-please PR" step in THIS
#      workflow (via scripts/release/push-release-tag.sh) detects the
#      `chore(main): release X.Y.Z` merge commit, pushes the
#      v<version> tag, calls `gh workflow run release.yml --ref vX.Y.Z`
#      to fire the release workflow, and flips the PR label from
#      `autorelease: pending` to `autorelease: tagged`.
#   5. release.yml fires (via workflow_dispatch from step 4), builds
#      binaries, and — via softprops/action-gh-release — creates the
#      GitHub Release ATOMICALLY with the asset uploads in the same
#      call.
#
# Why this two-step shape: GitHub treats PUBLISHED releases as
# IMMUTABLE for asset uploads. The historical setup (release-please
# creates the release published, then release.yml tries to attach
# assets) races against GitHub's immutability check — symptom:
# "Cannot upload asset … to an immutable release. GitHub only allows
# asset uploads before a release is published, so upload assets to a
# draft release before you publish it." A previous attempt (PR #60)
# set `draft: true` in release-please-config.json to avoid this, but
# that ALSO suppresses tag creation in release-please (draft releases
# in release-please's model live without a tag until publication), so
# release.yml never fired and release-please couldn't anchor its
# "latest release" detection — every subsequent run proposed a fresh
# 0.1.0 PR off the unparseable initial commits.
#
# `skip-github-release: true` was the correct knob to keep
# release-please away from release-page creation, but it bundles tag
# creation with release creation in release-please's strategy — both
# get skipped together. v0.2.2 and v0.2.3 each required a manual
# `git tag` + `git push origin v...` from the maintainer's shell.
# The companion push-release-tag.sh step closes that gap.
#
# Why no PAT (RELEASE_PLEASE_TOKEN): GitHub's anti-loop guard
# normally suppresses workflow chaining when refs are pushed by
# github-actions[bot] (the identity GITHUB_TOKEN surfaces as). That's
# why earlier revisions of this workflow required a maintainer-owned
# PAT — only a real-user-authored tag push would fire release.yml's
# `push: tags` trigger. push-release-tag.sh now sidesteps that by
# calling `gh workflow run release.yml --ref vX.Y.Z` after the tag
# push, which fires release.yml via the workflow_dispatch path (no
# anti-loop guard applies). Net: no PAT to maintain, the auto-fire
# still works, and the only cosmetic change is that tag commits are
# now authored by github-actions[bot] instead of the PAT owner.
#
# REPO SETUP — one-time:
#   1. Settings -> Actions -> General -> Workflow permissions ->
#      check "Allow GitHub Actions to create and approve pull requests".
#      Without this, the action runs to completion but fails with:
#      "GitHub Actions is not permitted to create or approve pull
#      requests."

on:
  push:
    branches: [main]

permissions:
  contents: write     # release-please-action commits + tag pushes
  pull-requests: write  # release-please-action opens release PRs;
  # gh pr edit flips labels
  actions: write      # push-release-tag.sh calls `gh workflow run
  # release.yml --ref vX.Y.Z` after pushing the tag

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Config + manifest live in release-please-config.json and
          # .release-please-manifest.json at the project root. The
          # release-type: simple setting in config means release-please
          # just maintains CHANGELOG.md + version files we declare --
          # it does not try to parse Go module versions or similar.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Checkout with the same token, so the subsequent `git push` of
      # the release tag uses GITHUB_TOKEN as the credential. The
      # anti-loop guard does suppress release.yml's `push: tags`
      # trigger for this push, but push-release-tag.sh calls
      # `gh workflow run release.yml` directly to fire it anyway —
      # see the header comment above.
      # fetch-depth: 0 because `git ls-remote` is remote-only but
      # `git rev-parse HEAD` and `git tag` need local history.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Push tag for merged release-please PR
        env:
          # head_commit.message is untrusted (anyone with push access
          # to a release-please-managed PR could craft it), so the
          # script reads it from this env var rather than letting the
          # workflow interpolate it into the run: command line.
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
          # GH_TOKEN powers both `gh workflow run release.yml`
          # (needs the actions: write permission granted at the job
          # level above) and `gh pr edit ... --label ...` (needs
          # pull-requests: write).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/release/push-release-tag.sh
