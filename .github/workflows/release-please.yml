name: release-please

# release-please reads conventional-commit messages on main, opens a PR
# that bumps the version + regenerates CHANGELOG.md, and — when that PR
# merges — creates a `vX.Y.Z` tag. The existing release.yml workflow
# triggers on that tag and produces the actual artifacts.
#
# So the flow is:
#   1. Conventional commits land on main (enforced by lefthook commit-msg).
#   2. release-please-action opens/updates a release PR with version bump
#      + changelog.
#   3. Maintainer merges the release PR.
#   4. release-please-action creates the v<version> tag.
#   5. release.yml fires on the tag and uploads binaries to the GitHub
#      Release.
#
# REPO SETUP — one-time:
#   1. Settings -> Actions -> General -> Workflow permissions ->
#      check "Allow GitHub Actions to create and approve pull requests".
#      Without this, the action runs to completion but fails with:
#      "GitHub Actions is not permitted to create or approve pull
#      requests."
#
#   2. (Strongly recommended.) Create a fine-grained PAT with
#      contents:write + pull-requests:write on this repo and save it
#      as the repo secret RELEASE_PLEASE_TOKEN. The action below uses
#      it when present and falls back to GITHUB_TOKEN otherwise.
#
#      Why: tags pushed by GITHUB_TOKEN do NOT fire downstream
#      workflows (GitHub anti-loop guard), so without a PAT the
#      vX.Y.Z tag release-please creates will NOT auto-trigger
#      release.yml -- you will have to fire that workflow manually
#      (`make release-fire TAG=vX.Y.Z`, or
#      `gh workflow run release.yml --ref vX.Y.Z`). With a PAT the
#      tag push is attributed to the PAT owner and release.yml runs
#      automatically. See RELEASES.md "When release.yml does not
#      auto-fire" for the full procedure.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Use a PAT when one is configured so the tag release-please
          # creates is attributed to a real account and fires
          # release.yml automatically. Falls back to GITHUB_TOKEN so
          # the action still runs (and the Release PR still opens) on
          # forks or repos without the secret -- the cost is that
          # release.yml has to be triggered manually for those tags.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          # Config + manifest live in release-please-config.json and
          # .release-please-manifest.json at the project root. The
          # release-type: simple setting in config means release-please
          # just maintains CHANGELOG.md + version files we declare --
          # it does not try to parse Go module versions or similar.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
