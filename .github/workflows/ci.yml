name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI only reads code — no releases or package pushes.
permissions:
  contents: read

jobs:
  # ── Job 1: All linters ──────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    # Extra scopes are needed by EnricoMi/publish-unit-test-result-action so
    # it can post the sticky comment + checks summary on pull requests. The
    # workflow-level default is contents:read; per-job permissions replace
    # rather than merge, so contents:read is re-listed below.
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # Load shared tool-version pins (SPECTRAL_VERSION, TYPOS_VERSION,
      # GOSEC_VERSION, HONKIT_VERSION) into $GITHUB_ENV so every step in
      # this job — including Spectral — reads from the same source as
      # Make, lefthook, and the dev-environment install scripts. See
      # tool-versions.env at the repo root.
      - name: Load tool versions
        run: cat tool-versions.env >> "$GITHUB_ENV"

      # Go — install golangci-lint from source with Go 1.26 so the binary is
      # compiled with Go >= 1.25 (matching go.mod). Using a pre-built binary
      # (golangci-lint-action) would fail because pre-built binaries are
      # compiled with an older Go and golangci-lint rejects projects
      # targeting a newer version.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.26'
          cache: true

      # Frontend — set up Node and build frontend/dist before Go linting so the
      # //go:embed all:frontend/dist directive in assets.go passes type-checking.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend (required for Go embed typecheck)
        run: cd frontend && npm run build

      # Bundle-size budget. Catches accidental regressions (e.g. someone
      # imports a 200KB library by mistake). Budgets are intentionally
      # generous — bump them on purpose if a real feature needs the room.
      - name: Enforce bundle-size budget
        env:
          MAX_JS_BYTES: "200000"   # 200 KB
          MAX_CSS_BYTES: "100000"  # 100 KB
        run: |
          set -e
          js_size=$(find frontend/dist/assets -name 'index-*.js'  -exec wc -c {} + | awk 'END{print $1}')
          css_size=$(find frontend/dist/assets -name 'index-*.css' -exec wc -c {} + | awk 'END{print $1}')
          echo "Bundle sizes: JS=${js_size}  CSS=${css_size}"
          fail=0
          if [ "$js_size" -gt "$MAX_JS_BYTES" ]; then
            echo "::error::JS bundle ${js_size}B exceeds budget ${MAX_JS_BYTES}B"
            fail=1
          fi
          if [ "$css_size" -gt "$MAX_CSS_BYTES" ]; then
            echo "::error::CSS bundle ${css_size}B exceeds budget ${MAX_CSS_BYTES}B"
            fail=1
          fi
          exit $fail

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint Go (default build tags)
        run: golangci-lint run ./...

      - name: Lint Go (serveronly build tag)
        run: golangci-lint run --build-tags serveronly ./...

      # Frontend linters — deps already installed above
      - name: Lint JavaScript/Vue (ESLint)
        run: cd frontend && npm run lint:js

      - name: Lint CSS (Stylelint)
        run: cd frontend && npm run lint:css

      - name: Lint HTML (HTMLHint)
        run: cd frontend && npm run lint:html

      # Shell scripts in scripts/ -- shellcheck for correctness, shfmt
      # for style. Mirrors `make lint-shell` locally. shellcheck is
      # pre-installed on ubuntu-latest; shfmt is not, so we install it
      # via go install (cheap since setup-go cached the toolchain).
      # No untrusted input passed through env or run blocks below.
      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@latest

      - name: Lint shell scripts (shellcheck + shfmt)
        run: make lint-shell

      # Dockerfile
      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: Dockerfile.build

      # OpenAPI spec — mirrors `make lint-openapi` (Spectral with the
      # spectral:oas ruleset + project overrides in .spectral.yaml).
      # Version comes from tool-versions.env (loaded above).
      - name: Lint OpenAPI (Spectral)
        run: npx --yes "@stoplight/spectral-cli@${SPECTRAL_VERSION}" lint api/openapi.yaml --fail-severity=warn

      # Spell-check code, docs, and identifiers. The action ships the
      # typos binary so the runner doesn't need a separate install
      # step; config lives in _typos.toml at the repo root.
      - name: Spell-check (typos)
        uses: crate-ci/typos@7b04f660f4ee4f048d18fd341887cf28dfbedfe2  # v1.46.3

      # Markdown lint — mirrors `make lint-md`. Config in
      # .markdownlint-cli2.yaml at the repo root; npx pulls the
      # version on demand so no global install is required.
      - name: Lint Markdown (markdownlint-cli2)
        run: npx --yes markdownlint-cli2

      # GitHub Actions workflow lint — catches deprecated inputs,
      # syntax errors, and shellcheck issues in `run:` blocks. The
      # action ships the actionlint binary so no install step.
      - name: Lint workflows (actionlint)
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8  # v2

      # Enforce the project's SHA-pinning policy for third-party
      # GitHub Actions. A tag-pinned action could be silently
      # re-pointed to a malicious commit; see CONTRIBUTING.md
      # → "Pinning GitHub Actions".
      - name: Enforce SHA-pinned actions
        run: bash scripts/check-action-pins.sh

      # Go unit tests (merge logic, inference helpers, screenshotType
      # classification). Parser golden-file tests are skipped by -short.
      # Tee through go-junit-report so the XML is always produced — the
      # final pass/fail decision is delegated to the EnricoMi step below
      # via `fail_on: test failures` so a fork PR without comment perms
      # still surfaces failures via the workflow conclusion.
      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run Go unit tests
        # continue-on-error keeps the workflow going so the JUnit XML is
        # uploaded + the EnricoMi step gets a chance to comment. The
        # EnricoMi step then fails the workflow if any test failed.
        continue-on-error: true
        run: |
          set -o pipefail
          go test -race -short -v ./... 2>&1 \
            | tee go-test.log \
            | go-junit-report -set-exit-code > go-junit.xml

      # Frontend unit tests (Vitest) — pure-helper coverage for the
      # extracted match-helpers.ts module. `--reporter=default` keeps the
      # log readable in the Actions run; `--reporter=junit` adds the XML
      # consumed by the EnricoMi step. The `--outputFile.junit=` form
      # scopes the path to the junit reporter only, so the default
      # reporter still writes to stdout.
      - name: Run frontend unit tests
        continue-on-error: true
        run: |
          cd frontend
          npx vitest run \
            --reporter=default \
            --reporter=junit \
            --outputFile.junit=../frontend-junit.xml

      # Upload the JUnit XML so the coverage-comment job can fold its
      # numbers + per-failure details into the single combined PR
      # comment. `if: always()` so the artifact still uploads when a
      # test step exited non-zero (which is the normal path on a
      # failing test — `continue-on-error: true` makes the step succeed,
      # but EnricoMi below is what flips the workflow to red).
      - name: Upload unit-test JUnit XML
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: unit-test-results
          path: |
            go-junit.xml
            frontend-junit.xml
          if-no-files-found: warn
          retention-days: 7

      # EnricoMi remains the workflow gate (it flips status to failure
      # via `fail_on: test failures` based on the JUnit XML), but its
      # own commenter is OFF — the coverage-comment job below renders
      # one combined sticky comment so the PR doesn't carry two
      # separate ones for tests and coverage.
      - name: Gate workflow on unit-test failures
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040  # v2
        with:
          check_name: Unit test results
          comment_mode: off
          files: |
            go-junit.xml
            frontend-junit.xml
          fail_on: test failures

      # TypeScript type-check — confirms api.ts agrees with the
      # OpenAPI-generated types in api.gen.d.ts.
      - name: TypeScript type-check
        run: cd frontend && npm run typecheck

      # Verify the committed types match the current OpenAPI spec.
      # Catches "you forgot to run `make gen-types` after editing
      # api/openapi.yaml" before it lands on main.
      - name: Verify generated types are in sync with OpenAPI spec
        run: |
          cd frontend && npm run gen:types
          if ! git diff --quiet src/api.gen.d.ts; then
            echo "::error::frontend/src/api.gen.d.ts is out of sync with api/openapi.yaml — run 'make gen-types' and commit"
            git diff src/api.gen.d.ts | head -50
            exit 1
          fi

  # ── Job 2: Linux/amd64 Wails app ────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4
      - name: Build Linux/amd64 Wails app
        run: make build-linux

  # ── Job 3: Windows/amd64 Wails app ──────────────────────────────────────
  build-windows:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4
      - name: Build Windows/amd64 Wails app
        run: make build-windows

  # ── Job 4: Server binaries + container image ─────────────────────────────
  build-server:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4
      - name: Build all server binaries (Linux, Windows, macOS arm64+amd64)
        run: make build-server-all
      - name: Build Linux server container image (with Tesseract)
        run: make build-server-container

  # ── Job 5: macOS Wails build (requires Apple SDK / Xcode CLT) ────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '26'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build macOS universal Wails app
        run: make build-mac

  # ── Job 6: Vulnerability scan ────────────────────────────────────────────
  # Mirrors `make trivy` but runs in CI and uploads results to the GitHub
  # Security tab (Alerts → Code scanning) as well as failing the build.
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy.sarif

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4
        with:
          sarif_file: trivy.sarif

  # ── Job 7: Go-specific vulnerability scan ────────────────────────────────
  # govulncheck is call-graph-aware: it only flags CVEs in code paths Recall
  # actually invokes. Complements Trivy (which scans all module versions
  # regardless of reachability) and typically produces fewer false positives.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan Go modules (default build tag)
        run: govulncheck ./...
      - name: Scan Go modules (serveronly build tag)
        run: govulncheck -tags serveronly ./...

  # gosec is a Go-idiom SAST: catches issues CodeQL and govulncheck don't
  # (Slowloris timeouts, file-mode bugs, weak crypto, taint-tracked path/
  # command/log injection). Mirrors `make lint-gosec`. Both build tags are
  # swept so the Wails and serveronly code paths both get covered.
  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Load tool versions
        run: cat tool-versions.env >> "$GITHUB_ENV"
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          cache: true
      # Install gosec as a Go binary against the runner's Go install
      # rather than via securego/gosec's docker action. The action ships
      # a docker image with its own bundled Go (older than this repo's
      # go.mod toolchain requirement) and inherits the runner's
      # GOTOOLCHAIN=local that setup-go sets — so the container's stale
      # Go can't be auto-upgraded and module loading fails. Going via
      # `go install` reuses the runner's Go 1.26 (set by setup-go above)
      # and matches how `make lint-gosec` runs locally. Version pinned
      # via tool-versions.env (GOSEC_VERSION).
      - name: Install gosec
        run: go install "github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}"
      # assets.go embeds `frontend/dist` (built by Vite). gosec only
      # needs Go source to compile, not real embed content, so stub the
      # directory rather than running a full `npm ci && npm run build`
      # — saves ~30s per CI run while still satisfying the //go:embed
      # directive. Build jobs that need actual assets handle the real
      # Vite build themselves.
      - name: Stub frontend/dist for //go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html
      - name: Run gosec (default build tag)
        run: gosec -exclude-dir=frontend ./...
      - name: Run gosec (serveronly build tag)
        run: gosec -exclude-dir=frontend -tags=serveronly ./...

  # ── Job 8: Dead code analysis ────────────────────────────────────────────
  # deadcode does whole-program call-graph analysis for Go (serveronly variant
  # only — the Wails variant registers App methods via reflection so deadcode
  # would report false positives; golangci-lint `unused` covers that variant).
  # knip scans the frontend for unused TypeScript exports and stale deps.
  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend (required for Go embed typecheck)
        run: cd frontend && npm run build

      - name: Install deadcode
        run: go install golang.org/x/tools/cmd/deadcode@latest

      - name: Dead Go code (serveronly build tag)
        # Delegates to scripts/deadcode-check.sh; the allow-list of
        # intentional unreachables lives in scripts/deadcode-allow.txt
        # and is shared with Make + lefthook so all three call sites
        # stay in sync.
        run: bash scripts/deadcode-check.sh

      - name: Dead TypeScript code (knip)
        run: cd frontend && npm run dead:ts

  # ── Job 9: Frontend coverage report ─────────────────────────────────────
  # Informational only — no thresholds enforced. The HTML report and lcov
  # file are uploaded as a workflow artifact so they can be downloaded from
  # the Actions run page for any push or PR.
  coverage-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Generate coverage report
        run: cd frontend && npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30

  # ── Job 10: Go coverage report ───────────────────────────────────────────
  # Informational only — no thresholds enforced. The HTML report and func
  # summary are uploaded as a workflow artifact so they can be downloaded
  # from the Actions run page for any push or PR.
  coverage-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          cache: true

      # Frontend build is required because assets.go uses
      # //go:embed all:frontend/dist — compiling the root `recall`
      # package (via `go test ./...`) fails if dist/ is missing.
      # Same prologue the lint and schemathesis jobs use.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build embedded frontend
        run: cd frontend && npm ci && npm run build

      - name: Generate Go coverage report
        run: make cover-go

      # gocover-cobertura converts Go's native coverprofile into the
      # Cobertura XML format that irongut/CodeCoverageSummary parses.
      # Bundled into the artifact so the coverage-comment job downloads
      # both formats in a single fetch.
      - name: Install gocover-cobertura
        run: go install github.com/boumenot/gocover-cobertura@latest

      - name: Convert coverage profile to Cobertura XML
        run: gocover-cobertura < coverage/go/coverage.out > coverage/go/cobertura.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: go-coverage
          path: coverage/go/
          retention-days: 30

  # ── Job 11: OpenAPI ↔ implementation drift check ─────────────────────────
  # Spectral checks the spec is well-formed; schemathesis checks the spec
  # matches the running server. Fuzzes spec-derived requests against a
  # freshly-built serveronly binary and verifies every response conforms to
  # the declared schema. Catches the "I added a route but forgot to update
  # api/openapi.yaml" class of bug that Spectral can't see.
  schemathesis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build embedded frontend
        run: cd frontend && npm ci && npm run build

      - name: Build server binary
        run: go build -tags serveronly -o recall-server .

      - name: Install Tesseract (no-op for API surface but Startup checks for it)
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends tesseract-ocr

      - name: Install schemathesis
        # Pinned to v3.x — v4 renamed --base-url → --url and changed
        # several flag/output shapes (e.g. --hypothesis-max-examples →
        # --max-examples). Bump deliberately when ready to update the
        # CLI invocation below.
        run: pipx install 'schemathesis>=3.36,<4'

      - name: Start server in background
        env:
          RECALL_SERVER_ADDR: 127.0.0.1:7000
        run: |
          ./recall-server &
          echo $! > server.pid
          # Wait up to 30s for the server to accept connections.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:7000/api/tesseract-status >/dev/null 2>&1; then
              echo "Server up after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run schemathesis against live server
        # `--checks all` enables every built-in compliance check:
        #   not_a_server_error, status_code_conformance, content_type_conformance,
        #   response_schema_conformance, response_headers_conformance.
        # `--hypothesis-max-examples=20` keeps wall time reasonable.
        # `--experimental=openapi-3.1` is required because schemathesis 3.x
        # only fully supports OpenAPI 3.0 by default and refuses 3.1 specs
        # without this opt-in. The flag becomes a no-op (and the install
        # pin <4 can be relaxed) once we move to schemathesis 4.x.
        # `--exclude-path /api/events` skips the SSE endpoint: it's a
        # long-lived text/event-stream that never closes from the server
        # side, so request-response fuzzing always trips the 10s response
        # timeout. The endpoint stays in the spec for documentation but
        # isn't a candidate for compliance fuzzing.
        run: |
          schemathesis run \
            --base-url http://127.0.0.1:7000 \
            --checks all \
            --hypothesis-max-examples 20 \
            --exclude-method DELETE \
            --exclude-path /api/events \
            --experimental=openapi-3.1 \
            api/openapi.yaml

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

  # ── Job 12: Combined PR report comment ───────────────────────────────────
  # Renders one sticky comment per PR that folds unit-test pass/fail +
  # coverage delta (vs. main's last successful CI run) into a single
  # markdown block. Only runs on pull_request events — push-to-main has
  # nowhere to comment. needs: ...lint so the JUnit XML artifact is
  # available; the always() in `if:` ensures the comment still posts
  # when the lint job has flipped to red due to a test failure (the
  # failure block is the whole point of the report in that case).
  pr-report:
    if: always() && github.event_name == 'pull_request'
    needs: [coverage-go, coverage-frontend, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # This PR's coverage + JUnit artifacts (from sibling jobs in the
      # same workflow run).
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: go-coverage
          path: pr-cov/go/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: frontend-coverage
          path: pr-cov/frontend/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        if: always()
        with:
          name: unit-test-results
          path: pr-tests/

      # main's most-recent coverage from a separate workflow run. The
      # baseline gives the Δ column meaning. dawidd6's action does the
      # cross-run lookup that actions/download-artifact can't (the
      # built-in only sees same-run artifacts). `if_no_artifact_found:
      # warn` keeps the job green on first-ever PR — the renderer
      # degrades gracefully to "—" baselines and explains why.
      - name: Download main's coverage baseline (Go)
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11  # v6
        with:
          workflow: ci.yml
          branch: main
          name: go-coverage
          path: main-cov/go/
          if_no_artifact_found: warn

      - name: Download main's coverage baseline (frontend)
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11  # v6
        with:
          workflow: ci.yml
          branch: main
          name: frontend-coverage
          path: main-cov/frontend/
          if_no_artifact_found: warn

      - name: Render combined PR report
        run: python3 scripts/render-pr-report.py > pr-report.md

      # Single-comment guarantee, part 1 — sweep stale CI-authored
      # comments before posting the new sticky. Two legacy patterns to
      # match: (a) EnricoMi's "Unit test results" heading from the
      # earlier two-comment era; (b) marocchino stickies posted under
      # the legacy `coverage` header. The current `pr-report` sticky
      # uses a different header marker, so this filter never touches
      # it. Idempotent — no-op when nothing matches. Defensive against
      # any future change that briefly leaks an orphan.
      - name: Sweep legacy CI-authored comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --paginate \
            "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[]
              | select(.user.login == "github-actions[bot]")
              | select(
                  (.body | startswith("# Unit test results"))
                  or (.body | startswith("# Unit Test Results"))
                  or (.body | contains("<!-- Sticky Pull Request Commentcoverage -->"))
                )
              | .id' \
            | while read -r id; do
                [ -n "$id" ] || continue
                echo "Deleting legacy CI comment $id"
                gh api -X DELETE \
                  "repos/${{ github.repository }}/issues/comments/${id}"
              done

      # Single-comment guarantee, part 2 — stickies on the `pr-report`
      # header so re-pushes update the same comment instead of stacking.
      # `recreate: true` deletes the previous pr-report comment and
      # posts a fresh one so the PR's notification fires on each new
      # state (vs. silent edit). Combined with the sweep above, the
      # PR carries exactly one CI-authored comment after any run.
      - name: Post combined PR report
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405  # v2
        with:
          header: pr-report
          recreate: true
          path: pr-report.md
