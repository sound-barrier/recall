name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI only reads code — no releases or package pushes.
permissions:
  contents: read

jobs:
  # ── Job 1: All linters ──────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Go — install golangci-lint from source with Go 1.26 so the binary is
      # compiled with Go >= 1.25 (matching go.mod). Using a pre-built binary
      # (golangci-lint-action) would fail because pre-builts are compiled with
      # an older Go and golangci-lint rejects projects targeting a newer version.
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Lint Go (default build tags)
        run: golangci-lint run ./...

      - name: Lint Go (serveronly build tag)
        run: golangci-lint run --build-tags serveronly ./...

      # Frontend — ESLint, Stylelint, HTMLHint
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint JavaScript/Vue (ESLint)
        run: cd frontend && npm run lint:js

      - name: Lint CSS (Stylelint)
        run: cd frontend && npm run lint:css

      - name: Lint HTML (HTMLHint)
        run: cd frontend && npm run lint:html

      # Dockerfile
      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.build

  # ── Job 2: Linux/amd64 Wails app ────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Linux/amd64 Wails app
        run: make build-linux

  # ── Job 3: Windows/amd64 Wails app ──────────────────────────────────────
  build-windows:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Windows/amd64 Wails app
        run: make build-windows

  # ── Job 4: Server binaries + container image ─────────────────────────────
  build-server:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build all server binaries (Linux, Windows, macOS arm64+amd64)
        run: make build-server-all
      - name: Build Linux server container image (with Tesseract)
        run: make build-server-container

  # ── Job 5: macOS Wails build (requires Apple SDK / Xcode CLT) ────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build macOS universal Wails app
        run: make build-mac
