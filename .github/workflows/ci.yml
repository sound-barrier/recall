name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI only reads code — no releases or package pushes.
permissions:
  contents: read

jobs:
  # ── Job 1: All linters ──────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Go — install golangci-lint from source with Go 1.26 so the binary is
      # compiled with Go >= 1.25 (matching go.mod). Using a pre-built binary
      # (golangci-lint-action) would fail because pre-builts are compiled with
      # an older Go and golangci-lint rejects projects targeting a newer version.
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # Frontend — set up Node and build frontend/dist before Go linting so the
      # //go:embed all:frontend/dist directive in assets.go passes type-checking.
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend (required for Go embed typecheck)
        run: cd frontend && npm run build

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint Go (default build tags)
        run: golangci-lint run ./...

      - name: Lint Go (serveronly build tag)
        run: golangci-lint run --build-tags serveronly ./...

      # Frontend linters — deps already installed above
      - name: Lint JavaScript/Vue (ESLint)
        run: cd frontend && npm run lint:js

      - name: Lint CSS (Stylelint)
        run: cd frontend && npm run lint:css

      - name: Lint HTML (HTMLHint)
        run: cd frontend && npm run lint:html

      # Dockerfile
      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.build

  # ── Job 2: Linux/amd64 Wails app ────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build Linux/amd64 Wails app
        run: make build-linux

  # ── Job 3: Windows/amd64 Wails app ──────────────────────────────────────
  build-windows:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build Windows/amd64 Wails app
        run: make build-windows

  # ── Job 4: Server binaries + container image ─────────────────────────────
  build-server:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build all server binaries (Linux, Windows, macOS arm64+amd64)
        run: make build-server-all
      - name: Build Linux server container image (with Tesseract)
        run: make build-server-container

  # ── Job 5: macOS Wails build (requires Apple SDK / Xcode CLT) ────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: '26'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build macOS universal Wails app
        run: make build-mac

  # ── Job 6: Vulnerability scan ────────────────────────────────────────────
  # Mirrors `make trivy` but runs in CI and uploads results to the GitHub
  # Security tab (Alerts → Code scanning) as well as failing the build.
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy.sarif

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

  # ── Job 7: Dependency review (PRs only) ──────────────────────────────────
  # Blocks PRs that introduce dependencies with known CVEs at HIGH or above.
  # Skipped on direct pushes to main (no diff to review).
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
