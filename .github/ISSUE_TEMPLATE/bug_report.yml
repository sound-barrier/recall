name: Bug report
description: Something in Recall is broken or behaves unexpectedly.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a clear bug report. The more
        of the fields below you can fill in, the faster the bug can be
        triaged. Skip a field with "n/a" if it genuinely doesn't apply.

  - type: input
    id: version
    attributes:
      label: Recall version
      description: Shown in the top-right corner of the app (e.g. `v0.1.0`). For the server binary run `recall-server --version`.
      placeholder: v0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - Linux (desktop or server)
        - Windows
        - Docker (server-only)
        - Other
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "macOS 15.2, Ubuntu 24.04, Windows 11 23H2, …"
    validations:
      required: true

  - type: input
    id: tesseract
    attributes:
      label: Tesseract version
      description: Shown in Recall's **Ingest → Engine** row, or run `tesseract --version`. 5.x is the supported series; 3.x and 4.x are known to misread the OW post-match font.
      placeholder: 5.5.0
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Include the exact error message if any.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered list. The clearer this is, the faster the fix.
      placeholder: |
        1. Open Recall
        2. Click Ingest → Run Parse
        3. …
    validations:
      required: true

  - type: textarea
    id: overwatch-screenshot
    attributes:
      label: Overwatch screenshot (if a parser bug)
      description: |
        If Recall mis-read a specific match (wrong map, wrong hero,
        wrong stat number, missing match entirely), attach the
        Overwatch post-match screenshot itself. Drag the PNG / JPG
        directly into this box.

        This is the single most useful piece of data for parser
        bugs — without it, the maintainer can only guess at which
        OCR step went sideways. Recall doesn't read BattleTags, so
        scoreboard tags don't affect repro; crop / blur them
        before uploading if you'd like.
    validations:
      required: false

  - type: textarea
    id: app-screenshot
    attributes:
      label: Recall app / website screenshot
      description: |
        Screenshot of the Recall window (or the browser if you're
        running server mode at `http://127.0.0.1:7000`) showing the
        buggy state. Helps for UI glitches, missing data,
        unexpected filter behavior, or anything visual.

        Drag images directly into this box. Annotations (red
        arrows, circles) help.
    validations:
      required: false

  - type: textarea
    id: export-bundle
    attributes:
      label: Export bundle (highly encouraged)
      description: |
        For anything more involved than a one-screenshot parser
        bug, attaching a Recall **export bundle** lets the
        maintainer load the exact matches you're reporting on into
        their own copy of the app and reproduce what you're seeing.
        Optional, but it usually turns a "hard to repro" bug into a
        next-day fix.

        **How to create one:**

        1. In Recall, switch to the **Matches** tab.
        2. Tick the checkboxes on the rows that show the bug —
           usually one or two matches is enough; pick whichever
           ones reproduce it.
        3. The bulk-action bar at the top of the list grows an
           **Export bundle…** button. Click it.
        4. In the modal, leave the filename as-is or rename it,
           optionally tick *Include hidden matches* /
           *Include unknown matches* if the bug touches those
           record sets, and click **Export**.
        5. Save the `.zip` somewhere you can find it, then **drag
           the file directly into this box** to upload it.

        **What's in it:** each ticked match's parsed data, the
        post-match screenshots Recall OCRed for those matches, and
        a manifest file. The bundle does **not** include your
        screenshots-folder path or any data about matches you
        didn't tick. It does include the actual screenshot bytes,
        so if your BattleTag is visible on the scoreboard and you
        don't want it shared, crop / blur the image before
        running Export bundle.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Terminal output, or the contents of the **Ingest → Parse** progress panel. Use a code block (` ``` `) if you can.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps — workarounds you've tried, whether this is a regression from a known-good version, related issues, etc.
    validations:
      required: false

  - type: checkboxes
    id: code-of-conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I have read and agree to follow the [Code of Conduct](https://github.com/sound-barrier/recall/blob/main/CODE_OF_CONDUCT.md).
          required: true
