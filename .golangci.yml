version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell
    # Bug-catchers
    - ineffassign
    - nilerr
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - durationcheck
    # Code quality
    - unconvert
    - nakedret
    - revive
    - exhaustive
    - dupword
  settings:
    errcheck:
      exclude-functions:
        - "(*database/sql.Rows).Close"
        - "(*os.File).Close"
        - "os.RemoveAll"
    exhaustive:
      default-signifies-exhaustive: true
    revive:
      rules:
        # Project style: no mandatory doc comments — conflicts with "no comments
        # by default" convention in CLAUDE.md.
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        # Blank imports for side-effect registration (sqlite driver, image/jpeg
        # decoder) are idiomatic; comments would add noise with no value.
        - name: blank-imports
          disabled: true
        # http.Handler signatures must include *http.Request even when unused;
        # renaming to _ would harm readability across all handlers.
        - name: unused-parameter
          disabled: true
  exclusions:
    paths:
      - frontend/node_modules

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      # Tell gofumpt our module path so it understands which imports are
      # "local" (recall/...). Without this it treats them as third-party
      # and complains about goimports-reviser's three-group layout
      # (stdlib / external / local) when there's no external group —
      # e.g. pkg/cmd/server.go and pkg/metrics/metrics.go which have
      # only stdlib + recall/... imports.
      module-path: recall
