apiVersion: 1

datasources:
  - name: Prometheus
    # Pinned UID matches `datasource.uid` in the auto-provisioned dashboard
    # (grafana/provisioning/dashboards/owmetrics.json). Without this Grafana
    # auto-generates a random UID, and the dashboard can't bind its panels
    # to the datasource ("datasource prometheus not found").
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
