# Lefthook pre-commit hooks.
# Install:  brew install lefthook && lefthook install
# Skip a hook for one commit: LEFTHOOK_EXCLUDE=name-of-hook git commit ...
# Skip all hooks for one commit: LEFTHOOK=0 git commit ...
#
# Hooks here run on a per-commit basis against ONLY the files in the
# staged diff (the {staged_files} placeholder). Full project lint lives
# in `make lint` and CI; lefthook is for fast pre-push feedback.

pre-commit:
  parallel: true
  commands:
    # ── Go ────────────────────────────────────────────────────────────
    gofumpt:
      glob: "*.go"
      run: gofumpt -l -w {staged_files}
      stage_fixed: true

    goimports-reviser:
      glob: "*.go"
      run: goimports-reviser -use-cache -project-name recall {staged_files}
      stage_fixed: true

    golangci-lint:
      glob: "*.go"
      run: golangci-lint run --new-from-rev=HEAD~ --fix
      stage_fixed: true

    # ── Frontend ──────────────────────────────────────────────────────
    eslint:
      root: "frontend"
      glob: "src/**/*.{ts,vue}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true

    stylelint:
      root: "frontend"
      glob: "src/**/*.{css,vue}"
      run: npx stylelint --fix {staged_files}
      stage_fixed: true

    # ── OpenAPI ───────────────────────────────────────────────────────
    # Spectral pin lives in tool-versions.env (SPECTRAL_VERSION) and is
    # shared with Make and CI. Sourced inline so a version bump in the
    # env file flows through here without a hook edit.
    spectral:
      glob: "api/openapi.yaml"
      run: |
        . ./tool-versions.env
        npx --yes "@stoplight/spectral-cli@${SPECTRAL_VERSION}" lint --fail-severity=warn {staged_files}

    gen-types:
      glob: "api/openapi.yaml"
      run: make gen-types
      stage_fixed: true

    # ── YAML / Dockerfile / Shell ─────────────────────────────────────
    yamllint:
      glob: "*.{yml,yaml}"
      run: yamllint {staged_files}
      exclude: "api/openapi.yaml"  # Spectral handles this

    hadolint:
      glob: "Dockerfile*"
      run: hadolint {staged_files}

    # shfmt + shellcheck on staged shell scripts. Same flags as
    # `make lint-shell` (the CI target) so the hook catches what CI
    # would catch — without this, format-only drift (e.g. `done <
    # "$F"` vs `done <"$F"`) sails through every push and fails CI
    # at the lint job. `--write` autofixes formatting; `stage_fixed`
    # re-stages the diff so the commit includes the canonical form.
    shfmt:
      glob: "*.sh"
      run: shfmt -i 2 -ci -bn -w {staged_files}
      stage_fixed: true

    shellcheck:
      glob: "*.sh"
      run: shellcheck {staged_files}

    # ── Spell-check ───────────────────────────────────────────────────
    # typos is a Rust binary, ~50ms on a typical staged-file set. Config
    # lives in _typos.toml at the repo root (excludes auto-generated
    # files + whitelisted false positives). `--force-exclude` makes
    # typos honor _typos.toml's `extend-exclude` patterns even when
    # filenames are passed as explicit positional args (which is
    # what lefthook does via {staged_files}); without the flag,
    # explicit-arg files bypass the exclude list and PNG byte streams
    # get scanned as text.
    typos:
      run: typos --force-exclude {staged_files}

    # ── Markdown ──────────────────────────────────────────────────────
    # Config in .markdownlint-cli2.yaml at the repo root. --fix runs
    # the autofix-safe rules (MD031 blanks-around-fences, MD022
    # blanks-around-headings, MD004 ul-style); errors that remain
    # after --fix are real bugs (broken anchors, missing alt text).
    markdownlint:
      glob: "*.md"
      exclude: "CHANGELOG.md"
      run: npx --yes markdownlint-cli2 --fix {staged_files}
      stage_fixed: true

# Pre-push dead-code analysis. Both tools do whole-project scanning so they
# can't be scoped to staged files like the pre-commit hooks above. Running
# them only on push keeps WIP commits fast while still catching dead code
# before it reaches origin. Skip with: LEFTHOOK_EXCLUDE=deadcode,knip git push
pre-push:
  parallel: true
  commands:
    # actionlint scans every workflow file each time — fast enough
    # (Go binary, ~50ms across our seven workflows) that pre-push is
    # the right phase. Catches deprecated action inputs, syntax
    # errors, and shellcheck issues in `run:` blocks before they hit
    # CI and fail there. Paired with the SHA-pin check so a contributor
    # adding a tag-pinned external action fails locally before pushing.
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: |
        actionlint .github/workflows/*.yml
        bash scripts/check-action-pins.sh

    # Delegates to scripts/deadcode-check.sh; the allow-list of
    # intentional unreachables (build-tag stubs, test-only seams) lives
    # in scripts/deadcode-allow.txt and is shared with Make + CI so all
    # three call sites stay in sync.
    deadcode:
      glob: "*.go"
      run: bash scripts/deadcode-check.sh

    knip:
      glob: "frontend/src/**/*.{ts,vue}"
      run: cd frontend && npm run dead:ts

    # gosec — Go SAST. Whole-program; can't be scoped to staged files
    # like the pre-commit Go hooks above. Both build tags swept so
    # Wails-only and serveronly code paths both get covered. Same tool
    # invocation as `make lint-gosec` and the CI security job — bypass
    # is `LEFTHOOK_EXCLUDE=gosec git push`. The repo's CI runs gosec on
    # every push, so skipping locally just shifts the failure point.
    gosec:
      glob: "*.go"
      run: make lint-gosec

    # Semgrep — JS/TS SAST counterpart to gosec. Sweeps frontend/src/
    # via the community rulesets (p/javascript + p/typescript +
    # p/owasp-top-ten). Server-side coverage comes from CodeQL's
    # javascript-typescript language (in codeql.yml); Semgrep here is
    # the fast local feedback loop so contributors catch findings
    # before push instead of in a 5-min CodeQL run. Registry rulesets
    # are fetched at scan time — needs internet.
    semgrep:
      glob: "frontend/src/**/*.{ts,js}"
      run: make lint-semgrep

    # Coverage gate. Runs the same `make cover` umbrella developers
    # invoke locally; vitest enforces the per-metric thresholds in
    # vitest.config.ts, and the cover-go target enforces the Go floor
    # (GO_COVERAGE_MIN, default 40). Skip with:
    #   LEFTHOOK_EXCLUDE=coverage git push
    # The CI workflow runs the same checks via Jobs 9 + 10, so a
    # push that bypasses this still fails in CI before merge.
    coverage:
      run: make cover

    # Cyclomatic complexity sweep — REPORT ONLY. Same script the CI
    # `complexity` job runs (see .github/workflows/ci.yml). gocyclo
    # for Go + ESLint's `complexity` rule for frontend, both with a
    # threshold of 10 (McCabe's 1976 recommendation). The script
    # always exits 0 so a high number never blocks a push; the goal
    # is situational awareness, not a gate. When a number warrants
    # action, raise a TECHNICAL_DEBT.md item.
    # Skip with: LEFTHOOK_EXCLUDE=complexity git push
    complexity:
      run: bash scripts/check-complexity.sh

    # Bundle-size budget — same script CI runs in the lint job, with
    # --build so the hook produces fresh frontend/dist/ artifacts to
    # measure (CI builds in an earlier step; locally we need to do
    # the build ourselves). Caps a contributor against pushing a
    # change that would fail CI's "Enforce bundle-size budget" step.
    # Budgets live as defaults in the script itself; bump them there.
    # Skip with: LEFTHOOK_EXCLUDE=bundle-size git push
    bundle-size:
      glob: "frontend/**"
      run: bash scripts/check-bundle-size.sh --build

    # Test-skip drift gate. Same `scripts/check-test-skips.sh` the
    # CI workflow runs — greps every `t.Skip*` in pkg/ and diffs
    # against `scripts/test-skips-allow.txt`. A new skip without an
    # allow-list entry fails locally before push. Flake-suppression
    # skips are not allowed; the allow-list is for documented
    # environment gates (OS-conditional probe tests, `-short`-mode
    # tesseract integration). Skip with:
    #   LEFTHOOK_EXCLUDE=test-skips git push
    test-skips:
      glob: "pkg/**/*_test.go"
      run: bash scripts/check-test-skips.sh

    # Playwright smoke subset. Mirrors `make test-e2e`'s harness
    # (build frontend/dist + serveronly binary, run on :7099 with
    # HOME=/tmp/recall-e2e) but `--grep`-filtered to a curated set
    # of high-value specs. Catches the strict-mode-locator + layout-
    # tolerance + route-mock-race patterns that have repeatedly
    # flaked CI in the past day. The full suite still gates in CI;
    # this is the fast local feedback loop.
    #
    # Target: ≤60s on a warm cache. Glob-scoped to the same surface
    # CI's e2e relevance gate uses, so a docs-only push doesn't pay
    # the cost. Skip with:
    #   LEFTHOOK_EXCLUDE=playwright-smoke git push
    playwright-smoke:
      glob: "{frontend/**,pkg/**,api/openapi.yaml,*.go}"
      run: bash scripts/check-playwright-smoke.sh

    # OpenAPI ↔ server drift — same `schemathesis` job CI runs (see
    # .github/workflows/ci.yml). The build+boot+fuzz+teardown logic
    # lives in scripts/check-api-drift.sh so the hook and CI stay in
    # sync. Fuzzes spec-derived requests against a freshly-built
    # serveronly binary on port 7099 with a HOME-isolated tempdir
    # and asserts every response conforms to the declared schema.
    # Catches the "I added a route but forgot to update
    # api/openapi.yaml" + "I echoed JSON without setting
    # Content-Type" classes of bug that Spectral + unit tests can't
    # see. Glob-scoped to API + server code so a docs-only push
    # doesn't pay the ~15s cost.
    # Requires: pipx install 'schemathesis>=3.36,<4'. The hook
    # short-circuits with an actionable error if schemathesis isn't
    # on PATH. Skip with: LEFTHOOK_EXCLUDE=schemathesis git push
    schemathesis:
      glob: "{api/openapi.yaml,pkg/cmd/**/*.go,pkg/app/**/*.go,main*.go}"
      run: bash scripts/check-api-drift.sh

# Commit-message format check (optional but pairs with release-please).
# Enable conventional commits via `commit-msg` hook — see release-please
# workflow for how commit messages drive automated versioning.
commit-msg:
  commands:
    conventional:
      # Match: feat:, fix:, chore:, docs:, refactor:, test:, perf:,
      # build:, ci:, revert:, style:. Optional scope in parens.
      # Optional `!` for breaking changes. Reject anything else.
      run: |
        first_line=$(head -n1 "{1}")
        if echo "$first_line" | grep -qE '^(feat|fix|chore|docs|refactor|test|perf|build|ci|revert|style)(\([a-z0-9_-]+\))?!?: .+'; then
          exit 0
        fi
        echo "Commit subject must follow Conventional Commits format:"
        echo "  <type>(<scope>)?(!)?: <description>"
        echo "  e.g. feat(parser): add Suravasa map alias"
        echo "       fix: rename brand-grey CSS var to brand-gray"
        echo "Allowed types: feat, fix, chore, docs, refactor, test, perf, build, ci, revert, style"
        echo "Bypass: LEFTHOOK_EXCLUDE=conventional git commit ..."
        exit 1
