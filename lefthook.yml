# Lefthook pre-commit hooks.
# Install:  brew install lefthook && lefthook install
# Skip a hook for one commit: LEFTHOOK_EXCLUDE=name-of-hook git commit ...
# Skip all hooks for one commit: LEFTHOOK=0 git commit ...
#
# Hooks here run on a per-commit basis against ONLY the files in the
# staged diff (the {staged_files} placeholder). Full project lint lives
# in `make lint` and CI; lefthook is for fast pre-push feedback.

pre-commit:
  parallel: true
  commands:
    # ── Go ────────────────────────────────────────────────────────────
    gofumpt:
      glob: "*.go"
      run: gofumpt -l -w {staged_files}
      stage_fixed: true

    goimports-reviser:
      glob: "*.go"
      run: goimports-reviser -use-cache -project-name recall {staged_files}
      stage_fixed: true

    golangci-lint:
      glob: "*.go"
      run: golangci-lint run --new-from-rev=HEAD~ --fix
      stage_fixed: true

    # ── Frontend ──────────────────────────────────────────────────────
    eslint:
      root: "frontend"
      glob: "src/**/*.{ts,vue}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true

    stylelint:
      root: "frontend"
      glob: "src/**/*.{css,vue}"
      run: npx stylelint --fix {staged_files}
      stage_fixed: true

    # ── OpenAPI ───────────────────────────────────────────────────────
    spectral:
      glob: "api/openapi.yaml"
      run: npx --yes @stoplight/spectral-cli@6.14.2 lint --fail-severity=warn {staged_files}

    gen-types:
      glob: "api/openapi.yaml"
      run: make gen-types
      stage_fixed: true

    # ── YAML / Dockerfile / Shell ─────────────────────────────────────
    yamllint:
      glob: "*.{yml,yaml}"
      run: yamllint {staged_files}
      exclude: "api/openapi.yaml"  # Spectral handles this

    hadolint:
      glob: "Dockerfile*"
      run: hadolint {staged_files}

# Pre-push dead-code analysis. Both tools do whole-project scanning so they
# can't be scoped to staged files like the pre-commit hooks above. Running
# them only on push keeps WIP commits fast while still catching dead code
# before it reaches origin. Skip with: LEFTHOOK_EXCLUDE=deadcode,knip git push
pre-push:
  parallel: true
  commands:
    deadcode:
      glob: "*.go"
      run: |
        pkgs=$(go list -tags serveronly ./... | grep -v node_modules)
        out=$(deadcode -tags serveronly $pkgs)
        [ -z "$out" ] || echo "$out"
        # Filter known-good intentional stubs and test-only seams:
        #   - App.Pick{TesseractBinary,ScreenshotsDir}: stubs in app_server.go;
        #     real impls live in app_wails.go (other build tag), and the
        #     server-mode REST endpoints replace the Wails dialog calls.
        #   - app.NewWithStore: constructor used only by tests (store
        #     integration suite). Test code isn't in deadcode's call graph
        #     for the production build, so the function looks unreachable.
        unexpected=$(printf '%s' "$out" | grep -vE 'App\.Pick|NewWithStore' || true)
        [ -z "$unexpected" ]

    knip:
      glob: "frontend/src/**/*.{ts,vue}"
      run: cd frontend && npm run dead:ts

# Commit-message format check (optional but pairs with release-please).
# Enable conventional commits via `commit-msg` hook — see release-please
# workflow for how commit messages drive automated versioning.
commit-msg:
  commands:
    conventional:
      # Match: feat:, fix:, chore:, docs:, refactor:, test:, perf:,
      # build:, ci:, revert:, style:. Optional scope in parens.
      # Optional `!` for breaking changes. Reject anything else.
      run: |
        first_line=$(head -n1 "{1}")
        if echo "$first_line" | grep -qE '^(feat|fix|chore|docs|refactor|test|perf|build|ci|revert|style)(\([a-z0-9_-]+\))?!?: .+'; then
          exit 0
        fi
        echo "Commit subject must follow Conventional Commits format:"
        echo "  <type>(<scope>)?(!)?: <description>"
        echo "  e.g. feat(parser): add Suravasa map alias"
        echo "       fix: rename brand-grey CSS var to brand-gray"
        echo "Allowed types: feat, fix, chore, docs, refactor, test, perf, build, ci, revert, style"
        echo "Bypass: LEFTHOOK_EXCLUDE=conventional git commit ..."
        exit 1
